body:
  text: 陳氏香譜卷二宋陳敬撰五香夜刻宣州石刻宂壺為漏浮木為箭自有熊氏以来尚矣三代兩漢迄今遵用雖制有工拙而無以易此國初得唐朝水秤作用精巧與杜牧宣潤秤漏頗相符合其後燕肅龍圖守梓州作蓮花漏上進近又吳僧瑞新創杭湖等州秤漏例皆踈畧慶厯戊子年初預班朝十二月起居退宣許百官於朝堂觀新秤漏因得詳觀而黙識焉始知古今之制都未精究盖少第二平水奩致漏滴之有遲速也亘古之闕繇我朝講求而大備邪嘗率愚短竊效成法施於婺睦二州鼓角樓熈寜癸丑嵗大旱夏秋泉冬愆南井泉枯竭民用艱險時待次梅谿始作百刻香印以凖昏曉又增置五夜香刻如左百刻香印百刻香印以堅木為之山梨為上樟楠次之其原一寸二分外經一尺一寸中心經一寸無餘用有文處分十二界迴曲其文横路二十一里路皆濶一分半鋔其上深亦如之毎刻長一寸四分凡一百刻通長二百四十寸毎時率二尺計二百四十寸凡八刻三分刻之一其中近狭處六暈相屬亥子也丑寅也夘辰也巳午也未申也酉戌也陰盡以至陽也戌之末則入亥以上六長暈各外相連陽時六皆順行自小以入大也㣲至著也其向外長六暈亦相屬子丑也寅夘也辰巳也午未也申酉也戌亥也陽終以入陰也亥之末則至子以上六狭處各内相連陰時六皆逆行從大以入小陰主减也並無斷際猶環之無端也毎起火各以其時大抵起午正第三路近中是或起日出視厯日日出夘初夘正幾刻故不定斷際起火處也五更印刻上印最長自小雪後大雪冬至小寒後單用其次有甲乙丙丁四印並兩刻用中印最平自驚蟄後至春分後單用秋分同其前後有戊己印各一並單用末印最短自芒種前及夏至小暑後單用其前有庚辛壬癸印並兩刻用百刻篆圖百刻香若以常香則無凖今用野蘇松毬二味相和令勻貯於新陶器内旋用野蘓即荏葉也中秋前採曝乾為末毎料十兩松毬即枯松花也秋末揀其自墜者曝乾剉去心為末毎用八兩昔嘗撰香譜序百刻香印未詳廣徳吳正仲製其篆刻并香法見貺較之頗精審非雅才妙思孰能至是因刻於石傳諸好事者熈寜甲寅嵗仲春二日右諫議大夫知宣城郡沈立題定州公庫印香箋香一兩檀香一兩零陵香一兩藿香一兩甘松一兩茅香半雨大黄半兩右杵羅為末用如常法凡作印篆須以杏仁末少許拌香則不起塵及易出脱後皆倣此和州公庫印香沉香十兩細剉檀香八兩細剉如棊子零陵香四兩生結香八兩藿香葉四兩焙甘松四兩去土草茅香四兩香附子二兩去黑皮色紅麻黄二兩去根細剉甘草二兩粗者細剉麝香七錢焰硝半兩乳香二兩頭髙秤龍腦七錢生者尤妙右除腦麝乳硝四味别研外餘十味皆焙乾𢷬細末盒子盛之外以紙包裹仍常置煖處旋取燒用切不可洩氣陰濕此香於幃帳中燒之悠揚作篆熏之亦妙别一方與此味數分兩皆同惟腦麝焰硝各増一倍章草香須白茅香乃佳毎香一兩仍入製過甲香半錢夲太守馮公義子宜所製方也百刻印香箋香三兩檀香二兩沉香二兩黄熟香二兩零陵香二兩藿香二兩土草香半兩去土茅香二兩盆硝半兩丁香半兩製甲香七錢半一夲作七分半龍腦少許右同末之燒如常法資善堂印香棧香三兩黄熟香一兩零陵香一兩藿香葉一兩沉香一兩檀香一兩白茅花香一兩丁香半兩甲香三分製過龍腦三錢麝香三錢右件羅細末用新瓦罐子盛之昔張全真參故𫝊張徳逺丞相甚愛此香毎一日一盤篆煙不息龍腦印香檀香十兩沉香十兩茅香一兩黄熟香十兩藿香葉十兩零陵香十兩甲香七兩半盆硝二兩半丁香五兩半棧香三十兩剉右為細末和匀燒如常法又方沈譜夾棧香半兩白檀香半兩白茅香二兩藿香一錢甘松半兩乳香半兩棧香二兩麝香四錢甲香一錢龍腦一錢沉香半兩右除龍麝乳香别研餘皆𢷬羅細末拌和令匀用如常法乳檀印香黄熟香六斤香附子五兩丁香皮五兩藿香四兩零陵香四兩檀香四兩白芷四兩棗半斤焙茅香二斤茴香二兩甘松半斤乳香一兩細研生結香四兩右搗羅為細末燒如常法供佛印香棧香一斤甘松三兩零陵香三兩檀香一兩藿香一兩白芷半兩茅香三錢甘草三錢蒼龍腦三錢右為細末如常法㸃燒無比印香零陵香一兩甘草一兩藿香葉一兩香附子一兩茅香二兩蜜湯浸一宿不可水多晒乾㣲炒過右為末毎用先於花模槮紫檀少許次布香末水浮印香新增柴灰一升或紙灰黄蠟二塊荔支大右同入鍋内煼蠟盡為度毎以香末脱印如常法将灰於面上攤勻次裁薄紙依香印大小襯灰覆放敲下置水盆中紙沉去仍輕来以紙炷㸃香寶篆香沉香一兩丁香皮一兩藿香一兩夾棧香二兩甘松半兩甘草半兩零陵香半兩甲香半兩製紫檀三兩焰硝二分右為末和匀作印時旋加腦麝各少許香篆一名夀香乳香旱蓮草降真香沉香檀香青布片燒灰存性貼水荷葉瓦松男兒胎髪一斤木櫟野蕷龍腦少許麝香少許山棗子右十四味為末以山棗子揉和前藥陰乾用燒香時以𤣥參末蜜調筯梢上引煙冩字畫人物皆能不散欲其散時以車前子末彈於煙上即散又方歌曰乳旱降沉香檀青貼髪山斷松椎櫟蕷腦射腹空間毎用銅筯引香煙成字或云入針沙等分以筯梢夹磁石少許引煙作篆丁公美香篆沈譜乳香半兩别夲一兩水蛭三錢壬癸蟲即蝌蚪也鬱金一錢定風草半兩即天麻苗龍腦少許右除龍腦乳香别研外餘皆為末然後一處匀和滴水為丸如桐子大毎用先以清水濕過手焚香烟起時以濕手按之任從巧意手常要濕歌曰乳蛭任風龍鬱煎手爐􅅡處發祥煙竹軒清下寂無事可愛翛然迎晝眠凝和諸香葉太社旁通香圖四和百花花蕊清真丈苑沉一兩檀半兩棧一錢甘松一錢𤣥參二兩丁皮一錢麝二錢常科降真半兩檀半兩甘松半兩楓香半兩茅香四兩芬積檀一兩棧半兩沉一錢降真半兩麝一錢腦一分甲香一錢清逺茅香半兩生結三分腦半錢沉一分麝一錢檀半兩衣香腦一錢零陵半兩麝一錢木香半兩檀一錢藿香一錢丁香半兩清神藿香半兩麝一錢腦一錢棧一兩沉半兩凝香麝一丁錢香枝半兩檀一兩半甲香一錢結香一錢甘草一分腦一錢降真百和寶篆右為極細末除寶篆外並以鍊蜜和劑作餅子􅅡如常法漢建寜宫中香黄熟香四斤白附子二斤丁香皮五兩藿香葉四兩零陵香四兩檀香四兩白芷四兩茅香二斤茴香二斤甘松半斤乳香一兩别器研生結香四兩棗子半斤焙乾一方入蘇合油一錢右為細末鍊蜜和勻窨月餘作丸或􅅡之唐開元宫中方沉香二兩細剉以絹袋盛懸於銚子當中勿令着底蜜水浸慢火煑一日檀香二兩茶清浸一宿炒候乾令無檀香氣味麝香二錢龍腦二錢别器硏甲香一錢法製馬牙硝一錢右為細末煉蜜和勻窨月餘取出旋入腦麝丸之或作花子􅅡如常法宫中香檀香八兩劈作小片臘茶清浸一宿挖出焙乾再以酒蜜浸一宿慢火炙乾入諸品沉香三兩甲香一兩生結香四兩龍麝各半兩别器研右為細末生蜜和勻貯甆器地窨一月旋丸􅅡之宫中香檀香一十二兩細剉水一升白蜜半斤同煑五七十沸挖出焙乾零陵香三兩藿香三兩甘松三兩茅香三兩生結香四兩甲香三兩法製黄熟香五兩煉蜜一兩半浸一宿焙乾用龍麝各一錢右為細末煉蜜和匀甆器封窨二十日旋丸􅅡之江南李主帳中香沉香一兩剉細如炷大蘓合香以不津甆器盛右以香投油封浸百日􅅡之入薔薇水更佳又方沉香一兩剉如炷鵝梨十枚切研取汁右用銀器盛蒸三次梨汁乾即可􅅡又方補遺沉香末一兩檀香末一錢鵞梨十枚右以鵞梨刻去瓤核如甕子状入香末仍将梨頂簽盖蒸三溜去梨皮研和令勻久窨可􅅡又方沉香四兩檀香一兩蒼龍腦半兩麝香一兩馬牙硝一錢研右細剉不用羅鍊蜜拌和燒之宣和御製香沉香七錢剉如麻豆檀香三錢剉如麻豆燭黄色金顔香二錢另研背陰草不近土者如無用浮萍朱砂二錢半飛細龍腦一錢麝香别研丁香各半錢甲香一錢製過右用皂兒白水浸輭以定盌一隻慢火􅆈令極軟和香得所次入金顔腦麝研勻用香蠟脱印以朱砂為衣置於不見風日處窨乾燒如常法御爐香沉香二兩細剉以絹袋盛之懸於銚中勿着底蜜水一碗慢火煑一日水盡再添檀香一兩細片以蠟茶清浸一日梢焙乾令無檀氣甲香一兩法製生梅花龍腦二錢别研馬牙硝麝香别研右搗羅取細末以蘇合油拌和勻甆合封窨一月許旋入腦麝作餅􅅡之李次公香棧香不拘多少剉如米粒龍腦各少許右用酒蜜同和入甆瓶蜜封重湯煑一日窨半月可燒趙清獻公香白檀香四兩研剉乳香纒末半兩研細𤣥參六兩温湯洗净慢火煑軟薄切作片焙乾右碾取細末以熟蜜拌勻入新甆罐内封窨十日􅅡如常法蘇州王氏幃中香檀香一兩直剉如米豆不可斜剉以蠟清浸令沒過二日取出窨乾慢火炒紫色沉香二錢直剉乳香一分别研龍腦别研麝香各一字别研清茶化開右為末净蜜六兩同浸檀茶清更入水半盞􅆈百沸復秤如蜜數度候冷入麩炭末三兩與腦麝和勻貯甆器封窨如常法旋丸􅅡之唐化度寺衙香白檀香五兩蘇合香二兩沉香一兩半甲香一兩煑製龍腦香半兩麝香半兩别研右細剉搗末馬尾羅過煉蜜捜和􅅡之開元幃中衙香沉香七兩二錢棧香五兩鷄舌香四兩檀香二兩麝香八錢藿香六錢零陵香四錢甲香二錢法製龍腦少許右搗羅細末錬蜜和勻丸如大豆􅅡之後蜀孟主衙香沉香三兩棧香一兩檀香一兩乳香一兩甲香一兩法製龍腦半錢别研香成旋入麝香一錢别研香成旋入右除龍麝外用秆末入炭皮末朴硝各一錢生蜜拌勻入甆盒重湯煑十數沸取出窨七日作餅􅅡之雍文徹郎中衙香沉香檀香棧香甲香黄熟香各一兩龍麝各半兩右搗羅為末錬和勻入甆器内宻封埋地中一月方可􅅡蘇内翰貧衙香白檀香四兩斫作薄片以蜜拌之净器内炒如乾旋入蜜不住手攪以黒褐色止勿令焦乳香五粒生絹裹之用好酒一盞同煑候酒乾至五七分取出麝香一字𤣥參一錢右先将檀香杵粗末次将麝香細研入檀香又入麩炭細末一兩借色與𤣥乳同研合和令勻煉蜜作劑入甆器罐蜜封埋地一月錢塘僧日休衙香紫檀四兩沈水香一兩滴乳香一兩麝香一錢右搗羅細末煉蜜拌入和勻圓如豆大入甆器久窨可􅅡金粟衙香梅蠟香一兩檀香一兩臘茶清煑五七沸二香同取末黄丹一兩乳香三錢片腦一錢麝香一字杉木炭二兩半為末秤净蜜二斤半右将蜜於净器内蜜封重湯煑滴入水中成珠方可用與香末拌勻入臼杵千餘作劑窨一月分􅅡衙香沉香半兩白檀香半兩乳香半兩青桂香半兩降真香半兩甲香半兩龍腦半兩麝香半兩另研右搗羅細末煉蜜拌勻次入龍腦麝香捜和得所如常􅅡之衙香黄熟香沉香棧香各五兩檀香藿香零陵香甘松丁皮甲香製各三兩丁香一兩半乳香半兩硝石三分龍腦三分麝香一兩右除硝石龍腦乳麝同研細外将諸香搗羅為散先量用蘇合油并煉過好蜜二斤和匀貯甆器埋地中一月所􅅡之衙香檀香五兩沉香結香藿香零陵香茅香燒灰存性甘松各四兩丁香皮甲香二錢腦麝各三分右細研煉蜜和匀燒如常法衙香生結香棧香零陵香甘松各三兩藿香丁香皮各一兩甲香二兩麝香一錢右粗末煉蜜放冷和勻依常法窨過􅅡之衙香檀香𤣥參各三兩甘松二兩乳香半兩别研龍麝各半兩右先将檀參剉細盛銀器内水浸慢火煑水盡取出焙乾與甘松同搗羅為末次入乳香末等一處用生蜜和勻久窨然後􅅡之衙香茅香二兩去雜草塵土𤣥參