爇如常法聞思香紫檀半兩蜜水浸三日慢火焙甘松半兩酒浸一日火焙橙皮一兩日乾苦楝花一兩榠查核一兩紫荔枝一兩龍腦少許右為末煉蜜和劑窨月餘爇之别一方無紫檀甘松用香附子半兩零陵香一兩餘皆同夀陽公主梅花香甘松半兩白芷半兩牡丹皮半兩藁本半兩茴香一兩丁皮一兩不見火檀香一兩降真香一兩白梅一百枚右除丁皮餘皆焙乾為粗末甆器窨半月爇如常法李王帳中梅花香丁香一兩一分新好者沉香一兩紫檀半兩甘松半兩龍腦四錢零陵香半兩麝香四錢製甲香三分杉松麩炭四兩右細末煉蜜和勻丸窨半月取出爇之梅花香苦參四兩甘松四錢甲香三分製之用麝香少許右細末煉蜜為丸如常法爇之梅花香丁香一兩藿香一兩甘松一兩檀香一兩丁皮半兩牡丹皮半兩零陵香二兩辛夷一分龍腦一錢右為末用如常法尤宜佩帶梅花香甘松一兩零陵香一兩檀香半兩茴香半兩丁香一百枚龍腦少許别研右為細末煉蜜合和乾濕皆可爇之梅花香沉香檀香丁香各一分丁香皮三分樟腦三分麝香少許右除腦麝二味乳鉢細研入杉木炭煤四兩共香和勻煉白蜜拌勻捻餅入無滲甆器窨久以銀葉或雲母襯燒之梅花香丁香枝杖一兩零陵香一兩白茅香一兩甘松一兩白檀香一兩白梅末二錢杏仁十五個丁香三錢白蜜半斤右為細末煉蜜作劑窨七日燒之梅英香揀丁香三錢白梅末三錢零陵香葉二錢木香一錢甘松半錢梅英香沉香三兩剉末丁香四兩龍腦七錢另研蘇合香二錢甲香二兩製硝石末一錢右細末入烏香末一錢煉蜜和勻丸如芡實爇之梅蘂香又名一枝香歌曰沉檀一分丁香半烰炭篩羅五兩灰煉蜜丸燒加腦麝東風吹綻十枝梅陳氏香譜卷二
