略噴盌盛蒸少時用三賴子二錢豆腐漿蒸以盞盖定檀一錢細剉合和令勻入麝香少許香爨零陵香茅香藿香甘松松子搥碎茴香三賴子豆腐同蒸過檀香木香白芷土白芷肉桂丁香丁皮牡丹皮沉香各等分麝香少許右用好酒噴過日晒乾以剪刀切碎碾為生料篩羅粗末瓦罈收頓輭香丁香加木香少許同炒心子紅若作黒色不用沉香各一兩白檀金顔黄蠟三賴子各二兩龍腦半兩三錢亦可蘇合油不拘多少生油少許白膠香半斤灰水於沙鍋内煑候浮上晷掠入涼水搦塊再用皂角水三四盞以香色白為度秤二兩入香用右先将蠟於定磁噐内溶開次下白膠香次生油次蘇合油攪勻取盌置地候大温入衆香每一兩作一丸更加烏篤耨一兩尤妙如造黒色者不用心子紅入香墨二兩燒紅為末和劑如前法可懐可佩可置扇柄把握輭香篤耨香檀香末麝香各半兩金顔香五兩牙子香為末蘇合油三兩銀硃一兩龍腦三錢右為細末用甆噐或銀噐扵沸湯鍋内頓放逐旋傾入蘇合油攪和停勻為度取出㵼入水中隨意作劑輭香沉香十兩金顔香棧香各二兩丁香一兩乳香半兩龍腦一兩半麝香三兩右為細末以蘇合油和納磁噐内重湯煑半日以稀稠得中為度以臼杵成劑輭香沉香為細末金顔香各半斤細末蘇合油四兩龍腦一錢細研右先以沉香末和蘇合油仍以冷水和成團却搦去水入金顔香龍腦又以水和成團再搦去水入臼用杵三五千下時時搦去水以水盡杵成團有光色為度如欲鞭更加金顔香如欲輭加蘇合油輭香上等沉香末五兩金顔香二兩半龍腦一兩右為末入蘇合油六兩半用綿濾過取浄油和香旋旋看稀稠得所入油如欲黒色加百草霜少許輭香沉香檀香棧香各三兩亞息香梅花龍腦甲香製松子仁各半兩金顔香龍涎麝各一錢篤耨油隨分杉木炭以黒為度右除腦麝松仁篤耨外餘皆取極細末以篤耨油與諸香和勻為劑廣州吳家輭香金顔香半斤研細蘇合油二兩沉香一兩末腦麝各一錢别研黄蠟二錢芝麻油一錢臘月者經年尤佳右将油蠟同銷鎔放令微温和金顔沉末令勻次入腦麝與蘇合油同捜仍扵浄石版上以木槌擊數百下如常法用之翟仲仁運使輭香金顔香半兩蘇合油三錢腦麝各一匙烏梅肉二錢半焙乾右先以金顔腦麝烏梅肉為細末後以蘇合油相合和臨時相度鞭輭得所欲色紅加銀硃二錢半欲色黒加皂兒灰三錢存性寳梵院主輭香沉香二兩金顔香半斤細末龍腦四錢麝香二錢蘇合油二兩半黄蠟一兩半右細末蘇合與蠟重湯鎔和搗諸香入腦子更杵千餘下輭香金顔香半斤極好者貯銀噐用湯煑花細布紐浄研蘇合油四兩龍腦一錢研細麝香半錢研細心紅不計多少色紅為度右先将金顔香搦去水銀石銚内化開次入蘇合油麝香拌勻續入龍腦心紅移銚去火攪勻取出作團如常法輭香黄蠟半斤溶成汁濾浄却以浄銅銚内下紫草煎令紅濾去草滓檀香就舖買細屑碾令細篩過二兩金顔三兩揀去雜物取浄秤别研細作一處滴乳香三兩揀明塊者用茅香煎水煑過令浮成片如膏須冷水中取出待水乾入乳鉢内細研如粘鉢則入煆過醋焠来底赭石二錢同研則不粘矣沉香半兩要極細末蘇合油二兩如結合時先以生蘿蔔擦了乳鉢則不粘無則代之生麝香三錢浄鉢内以茶清滴研細却以其餘香拌起一䖏銀硃隨意加入以紅為度右以蠟入噐大盌内坐重湯中溶成汁入蘇合油和成了停勻却入衆香以栁棒極勻即香成矣欲輭用松子仁三兩揉汁於内雖大雪亦輭輭香檀香一兩白梅煑剉碎為末沉香半兩丁香三錢蘇合油半兩金顔香二兩蒸如無揀好楓滴乳香一兩酒煑過代之銀硃隨意右諸香皆不見火為細末打和扵甑上蒸碾成為香加腦麝亦可先将金顔碾為細末去滓輭香金顔香蘇合油各三兩篤耨油一兩二錢龍腦四錢麝香一錢銀硃四兩右先将金顔碾為細末去滓用蘇合油坐熱入黄蠟一兩坐化逐旋入金顔香坐過了腦麝篤耨油銀硃打和以輭筍籜包縳收黄則加蒲黄二兩緑則入緑二兩黒則入墨一二兩紫則入紫草各量多少加入以勻為度熏衣香茅香四兩細剉酒洗微蒸零陵香甘松各半兩白檀二錢錯末丁香二錢白乾三个焙乾取末右同為粗末入米腦少許薄紙貼佩之蜀主熏御衣香丁香棧香沉香檀香麝香各一兩甲香三兩製右為末煉蜜放冷令勻入窨月餘用如前見第一卷南陽宫主熏衣香蜘蛛香一兩香白芷零陵香縮砂仁各半兩丁香麝香當歸荳蔲各一分熏衣香沉香四兩棧香三兩檀香一兩半龍腦牙硝甲香各半兩灰水洗過浸一宿次用新水洗過復以蜜水去黄製用麝香一錢右除麝腦别研外同粗末煉蜜半斤和勻候冷入龍麝新料熏衣香沉香一兩棧香七錢檀香半錢牙硝一錢甲香一錢製如前荳蔲一錢米腦一錢麝香半錢右先将沉檀棧為粗末次入麝拌勻次入甲香並牙硝銀硃一字再拌煉蜜和勻上糝腦子用如常法千金月令熏衣香沉香丁香皮各二兩鬱金二兩細切蘇合香詹糖香各一兩同蘇合和作餅小甲香四兩半以新牛糞汁二升水三升和煑三分去二取出以浄水淘刮去上肉焙乾又以清酒二升蜜半合和煑令酒盡以物攪候乾以水洗去蜜暴乾另為末右将諸香末和勻燒熏如常法熏衣梅花香甘松舶上茴香木香龍腦各一兩丁香半兩麝香一錢右件搗合粗末如常法燒熏熏衣芬積香沉香二十五兩剉棧香剉檀香剉臘茶清炒黄甲香製法如前杉木烰炭各二十兩零陵葉藿香葉丁香牙硝各十兩米腦三兩研梅花龍腦二兩研麝香五兩研蜜十斤煉和香熏衣衙香生沉香剉棧香各六兩剉檀香剉臘茶清炒生牙硝各十二兩生龍腦研麝香各九兩研甲香六兩炭灰煑二日洗浄再加酒蜜同煑乾白蜜比香斤加倍用煉熟右為末研入腦麝以蜜捜和令勻燒熏如常法熏衣笑蘭香藿苓甘芷木茴丁茅賴芎黄和桂心檀麝牡皮加減用酒噴日晒絳嚢盛零以蘇合油揉勻松茅酒洗三賴米泔浸大黄蜜蒸麝香逐裹脿入熏衣加䕬蠶常帶加白梅肉塗傅諸香傅身香粉荚粉别研青木香麻黄根附子炮甘松藿香零陵香各等分右除荚粉外同搗羅為細末以生絹夹帶盛之浴罷傅身上拂手香白檀香三兩滋潤者剉末用蜜三錢化湯一盞許炒令水盡稍覺浥濕焙乾杵羅細末米腦一兩研阿膠一片右将阿膠化湯打糊入香末捜拌勻扵木臼中搗三五日捻作餅子或脫花窨乾穿穴線懸扵胷間梅真香零陵葉甘松白檀丁香白梅末各半兩腦麝少許右為細末糝衣傅身皆可用之香髮木犀油凌晨摘木犀花半開者揀去莖蒂令浄髙量一斗取清麻油一斤輕手拌勻捺甆噐中厚以油紙宻封罐口坐扵釜内以重湯煑一餉久取出安頓穏燥處十日後傾出以手沘其清液收之最要封閉最宻久而愈香如此油勻入黄蠟為面脂馨香也香餅凡燒香用餅子須先燒令通赤置香爐内俟有黄衣生方徐徐以灰覆之仍手試火氣𦂳慢香餅輭炭三斤末蜀葵花或葉一斤半右同搗令粘勻作劑如乾更入薄麫糊少許彈子大捻作餅晒乾貯磁噐内燒旋取用如無葵則炭末中拌入紅花滓同搗以薄糊和之亦可香餅堅硬羊胫炭三斤末黄丹定粉針沙牙硝各五兩棗一升煑爛去皮核右同搗拌勻以􅀥膏和劑隨意捻作餅子香餅木炭三斤末定粉黄丹各二錢右拌勻糯米為糊和成入鐡臼内細杵以圈子脫作餅晒乾用之香餅用櫟炭和柏葉葵菜橡實為之純用櫟炭則焦熟而易碎石餅太酷不用耐久香餅鞕炭末五兩胡粉黄丹各一兩右同搗細末煑糯米膠和勻捻餅子晒乾每用燒令赤炷香經久或以針沙代胡粉煑􅀥代粳米膠長生香餅黄丹四兩乾蜀葵花燒灰乾茄根各二兩燒灰􅀥半斤去核右為細末以􅀥肉研作膏同和勻捻作餅子窨晒乾置爐而火耐久不熄終日香餅羊胫炭一斤末黄丹定粉各一分針沙少許研勻右煑􅀥肉杵膏拌勻捻作餅子窨二日便扵日中晒乾如燒香畢水中蘸滅可再用丁晉公文房七寳香餅青州􅀥一斤和核用木炭二升末黄丹半兩鐵屑二兩造針處有定粉細墨各一兩丁香二十粒右同搗為膏如乾時再加􅀥以模子脫作餅如錢許每一餅可經晝夜内府香餅木炭末一斤黄丹定粉各三兩針砂三兩􅀥半升右同末蒸􅀥肉杵作餅晒乾每一板可度終日賈清泉香餅羊胫炭一斤末定粉黄丹各四兩右用糯米粥或􅀥肉和作餅晒乾用常法茄􅀢燒夹存性􅀥肉同杵捻餅晒乾用之香煤近来焚香取火非竈下即蹈爐中者以之供神佛格祖先其不潔多矣故用煤以扶接火餅香煤乾竹筒乾栁枝燒黒灰各二兩鉛粉三錢黄丹三兩焰硝二錢右同為末每用匕許以燈爇於上焚香香煤茄葉不計多少燒灰存性取麵四兩定粉三十黄丹二十海金沙二十右同末拌勻置爐灰上紙㸃可終日香煤竹夫炭栁木炭各四兩黄丹粉各二錢海金沙一錢研右同為末拌勻捻作餅入爐以燈㸃着燒香香煤枯茄樹燒成炭於瓶内候冷為末每一兩入鉛粉二錢黄丹二錢半拌和装灰中香煤焰硝黄丹杉木炭各等分為末糝爐中以紙撚㸃日禪師香煤杉木夫炭四兩竹夫炭鞕羊脛炭各二兩黄丹海金沙各半兩右同為末拌勻每用二錢置爐中紙燈㸃燒候透紅以冷灰薄覆閻資欽香煤柏葉多採之摘去枝梗浄洗日中曝乾剉碎不用墳墓間者入浄罐内以塩泥固濟炭火煆之存性細研每用一二錢置香爐灰上以紙燈㸃候勻編焚香時時添之可以終日或燒柏子存性作火尤妙香灰細葉杉木枝燒灰用火一二塊養之經宿羅過装爐每秋間採松鬚曝乾燒灰用養香餅未化石灰槌碎羅過鍋内炒令候冷又研又羅為之作香爐灰潔白可愛日夜常以火一塊養之仍須用盖若塵埃則黒矣礦灰六分爐灰四錢和勻大火養灰爇性香蒲燒灰爐装如雪紙灰石灰木灰各等分以米湯和同煆過勿令偏頭青朱紅黒煤土黄各等分雜扵紙中装爐名錦灰紙灰炒通紅羅過或稻穅燒灰皆可用乾松花燒灰装香爐最潔茄灰亦可蔵火火久不熄蜀葵枯時燒灰装爐大能養火香品噐香爐香爐不拘銀銅鐵錫石各取其便用其形或作狻猊獬豸鳬鴨之類計其人之當作頭貴穿窿可泄火氣置竅不用大都使香氣回薄則能耐久香盛盛即盒也其所用之物與爐等以不生澁枯燥者皆可仍不用生銅銅易腥漬香盤用深中者以沸湯㵼中令其氣蓊鬱然後置爐其上使香易著物香匙平灰置火則必用圓者分香抄末則必用銳者香筯和香取香摠宜用筯香壺或范金或埏為之用盛匕筯香甖窨香用之深中而掩上陳氏香譜卷三
