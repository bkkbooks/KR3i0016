body:
  text: 陳氏香譜卷一宋陳敬撰許氏説文香芳也篆从黍从甘𨽻省作香春秋𫝊曰黍稷馨香凡香之屬皆從香香之逺聞曰馨香之美者曰􅤩踈士反香之氣曰馦許兼反曰馣烏含反曰馧扵云反曰馥扶福反曰􅀈扵盖反曰馤同上曰馪匹民反曰馢則前反曰馛蒲撥反曰􅶵匹結反曰馝毗必反曰馞蒲役反曰馠火含反曰馩符分反曰馚同上曰䭱方减反曰􅀈奴混反曰􅀈薄庚切曰馟陀胡反曰䭲扵騎反曰馜女氏反曰䭯普沒反曰䭱蒲結反曰􅀈普滅反曰􅀈烏孔反曰毗霄反曰􅀈步結反曰􅀈許葛反曰馡甫㣲反香品舉要云香最多品類出交廣崖州及海南諸國然秦漢以前未聞惟稱蘭蕙椒桂而已至漢武奢廣尚書郎奏事者始有含雞舌香其他皆未聞迨晉武時外國貢異香始此及隋除夜火山燒沉香甲煎不計數海南諸品畢至矣唐眀皇君臣多有沉檀腦麝為亭閣何多也後周顯徳間昆眀國又獻薔薇水矣昔所未有今皆有焉然香者一也或出於草或出扵木或花或實或節或葉或皮或液或又假人力而煎和成有供焚者有可佩者又有充入藥者詳列如左至治馨香感於神眀書君陳弗惟徳馨香書酒誥其香始升上帝居歆詩生民有飶其香邦家之光詩載芟黍稷馨香左氏𫝊蘭有國香左氏𫝊其徳足用昭其馨香國語如入芝蘭之室久而不聞其香家語香品龍腦香唐夲草云出婆律國樹形似杉木子似荳䓻皮有甲錯婆律膏是根下清脂龍腦是根中乾脂味辛香入口段成式云亦出波斯國樹髙八九丈大可六七圍葉圓而背白無花實其樹有肥痩痩者出龍腦香肥者出婆律膏香在木心中婆律斷其樹翦取之其膏扵木端流出圖經云南海山中亦有此木唐天寶中交阯貢龍腦皆如蟬蠶之形彼人言有老根節方有之然極難禁中呼瑞龍腦帶之衣衿香聞十餘步今海南龍腦多用火煏成片其中容偽陶𨼆居云生西海婆律國婆律樹中脂也如白膠香状味苦辛㣲温無毒主内外障眼去三蟲療五痔眀目鎮心秘精又有蒼龍腦主風疹䵟面入膏煎良不可㸃眼其眀净如雪花者善久經風日或如麥麩者不佳宜合黒荳糯米相思子貯之甆器内則不耗今復有生熟之異稱生龍腦即是所載是也其絶妙者曰梅花龍腦有經火飛結成塊者謂之熟龍腦氣味差薄盖益以他物也葉庭珪云渤泥三佛齊亦有之乃深山窮谷千年老杉樹枝榦不損者若損動則氣洩無腦矣其土人解為板板傍裂縫腦出縫中劈而取之大者成片俗謂之梅花腦其次謂之速腦速腦之中又有金腳其碎者謂之米腦鋸下杉屑與碎腦相雜者謂之蒼腦取腦已净其杉板謂之腦夲與鋸屑同𢷬碎和置甆盆内以笠覆之封其縫熱灰煨煏其氣飛上凝結而成塊謂之熟腦可作面花耳環佩帶等用又有一種如油者謂之腦油其氣勁扵腦可浸諸香陳正敏云龍腦出南天竺木本如松初取猶濕斷為數十塊尚有香日久木乾循理拆之其香如雲母者是也與中土人取樟腦頗異今案段成式所述與此不同故兩存之婆律香本草拾遺云出婆律國其樹與龍腦同乃樹之清脂也除惡氣殺蟲蛀詳見龍腦香沉水香唐夲草云出天竺單于二國與青桂雞骨棧香同是一樹葉似橘經冬不凋夏生花白而圓細秋結實如檳榔其色紫似葚而味辛療風水毒腫去惡氣樹皮青色木似櫸栁重實黑色沉水者是今復有生黄而沉水者謂之蠟沉又有不沉者謂之生結即棧香也拾遺觧紛云其樹如椿常以水試乃知葉庭珪云沉香所出非一真臘者為上占城次之渤泥最下真臘之真又分三品綠洋最佳三濼次之勃羅間差弱而香之大概生結者為上熟脱者次之堅黑為上黄者次之然諸沉之形多異而名亦不一有状如犀角者如燕口者如附子者如梭者是皆因形為名其堅緻而文横者謂之横隔沉大扺以所産氣色為髙而形體非所以定優劣也綠洋三濼勃羅間皆真臘屬國談苑云一樹出香三等曰沉曰棧曰黄熟倦遊錄云沉香木嶺南瀕海諸州尤多大者合抱山民或以為屋為橋梁為飯甑然有香者百無一二盖木得水方結多在折枝枯榦中或為棧或為黄熟自枯死者謂之水盤香髙竇等州産生結香盖山民見山木曲折斜枝必以刀斫成坎經年得雨水漬遂結香復鋸取之刮去白木其香結為斑㸃亦名鷓鴣斑沉之良久在瓊崖等州俗謂之角沉乃生木中取者宜用熏裛黄沉乃枯木中得者宜入藥黄臘沉尤難得按南史云置水中則沉故名沉香浮者棧香也陳正敏云水沉出南海凡數重外為斷白次為棧中為沉今嶺南巖髙峻處亦有之但不及海南者香氣清婉耳諸夷以香樹為槽而餉雞犬故鄭文寶詩云沉檀香植在天涯賤等荆衡水而槎未必為槽餉雞犬不如煨燼向髙家今按黄臘沉削之自卷嚙之柔韌者是餘見第四卷丁晋公天香𫝊中生沉香一名蓬莱香葉庭珪云出海南山西其初連木状如粟棘房土人謂棘香刀刳去木而出其香則堅倒而光澤士大夫目為蓬莱香氣清而長耳品雖侔於真臘然地之所産者少而官於彼者乃得之商舶罕獲焉故直常倍扵真臘所産者云蕃香一名蕃沉葉庭珪云出渤泥三佛齊氣礦而烈價視真臘綠洋减三分之二視占城减半矣治冷氣醫家多用之青桂香夲草拾遺云即沉香同樹細枝𦂳實未爛者談苑云沉香依木皮而結謂之青桂棧香本草拾遺云棧與沉同樹以其肌理有黑脉者為别葉庭珪云棧香乃沉香之次者出占城國氣味與沉香相類但帶木頗不堅實故其品亞於沉而復於熟遜焉黄熟香亦棧香之類也但輕虚枯朽不堪者今和香中皆用之葉庭珪云黄熟香夹棧黄熟香諸蕃皆出而真臘為上黄而熟故名焉其皮堅而中腐者形状如桶故謂之黄熟桶其夹棧而通黑者其氣尤䑃故謂之夹棧黄熟此香雖泉人之所日用而夹棧居上品葉子香一名龍鱗香盖棧之薄者其香尤勝扵棧談苑云沉香在土嵗久不待刓剔而精者雞骨香本草拾遺云亦棧香中形似雞骨者水盤香類黄熟而殊大多雕刻為香山佛像並出舶上白眼香亦黄熟之别名也其色差白不入藥品和香㦯用之檀香夲草拾遺云檀香其種有三曰白曰紫曰黄白檀樹出海南主心腹痛霍亂中惡鬼氣殺蟲唐夲草云味鹹㣲寒主惡風毒出崑崙盤盤之國主消風腫又有紫真檀人磨之以塗風腫雖不生於中土而人間徧有之葉庭珪云檀香出三佛齊國氣清勁而易洩􅅡之能奪衆香皮在而色黄者謂之黄檀皮腐而色紫者謂之紫檀氣味大率相類而紫者差勝其輕而脆者謂之沙檀藥中多用之然香樹頭長商人截而短之以便負販恐其氣洩以紙封之欲其滋潤故也陳正敏云亦出南天竺末耶山崖谷間然其他雜木與檀相類者甚衆殆不可别但檀木性冷夏月多大蛇蟠遶人逺望見有蛇處即射箭記之至冬月蛇蟄乃伐而取之也木香夲草云一名宻香從外國舶上来葉似薯蕷而根大花紫色功效極多味辛温無毒主辟瘟疫療氣劣氣不足消毒殺蟲毒今以如雞骨堅實嚙之粘牙者為上又有馬兠鈴根名曰青木香非此之謂也㦯云有二種亦恐非耳一謂之雲南根降真香南州記云生南海諸山大秦國亦有之海藥夲草云味温平無毒主天行時氣宅舍怪異並燒之有驗列僊傳云燒之感引鶴降醮星辰燒此香妙為第一小兒佩之能辟邪氣状如蘓枋木然之初不甚香得諸香和之則特美葉庭珪云出三佛齊國及海南其氣勁而逺能辟邪氣泉人毎嵗除家無貧富皆􅅡之如燔柴雖在處有之皆不及三佛齊者一名紫藤香今有蕃降廣降之别生熟速香葉庭珪云生速香出真臘國熟速香所出非一而真臘尤勝占城次之渤泥最下伐樹去木而取香者謂之生速香樹仆扵地木腐而香存者謂之熟速香生速氣味長熟速氣味易焦故生者為上熟者次之暫香葉庭珪云暫香乃熟速之類所産髙下與熟速同但脱者謂之熟速而木之半存者謂之暫香其香半生熟商人以刀刳其木而出香擇尤美者雜於熟速而貨之故市者亦莫之辨鷓鴣斑香葉庭珪云出海南與真臘生速等但氣味短而薄易燼其厚而沉水者差久文如鷓鴣斑故名焉亦謂之細冒頭至薄而沉烏里香葉庭珪云出占城國地名烏里土人伐其樹札之以為香以火焙乾令香脂見於外以輸租役商人以刀刳其木而出其香故品下扵他香生香葉庭珪云生香所出非一樹小老而伐之故香少而未多其直雖下於烏里然削木而存香則勝之矣交趾香葉庭珪云出交趾國㣲黑而光氣味與占城棧香相類然其地不通商舶而土人多販於廣西之欽州欽人謂之光香乳香廣志云即南海波斯國松樹脂紫赤色如櫻桃者名曰乳香盖薰陸之類也僊方多用辟邪其性温療耳聾中風口噤婦人血風能發酒治風冷止大膓洩澼療諸瘡癤令内消今以通眀者為勝目曰滴乳其次曰揀香又次曰瓶香然多夹雜成大塊如􅅹青之状又其細者謂之香纒沈存中云乳香夲名薰陸以其下如乳頭者謂之乳頭香葉庭珪云一名薰陸香出大食國之南數千里深山窮谷中其樹大抵類松以斤斫樹脂溢於外結而成香聚而為塊以象輦之至於大食大食以舟載易他貨於三佛齊故香常聚於三佛齊三佛齊毎嵗以大舶至廣與泉廣泉二舶視香之多少為殿最而香之品十有三其最上品者為揀香圓大如乳頭俗所謂滴乳是也次曰瓶乳其色亞於揀香又次曰瓶香言收時量重置於瓶中在瓶香之中又有上中下三等之别又次曰袋香言收時只置袋中其品亦有三等又次曰乳搨盖香在舟中鎔搨在地雜以沙石者又次黑搨香之黑色者又次曰水濕黑搨盖香在舟中為水所浸漬而氣變色敗者也品雜而碎者曰斫削簸揚為塵者曰纒末此乳香之别也温子皮云廣州蕃藥多偽者偽乳香以白膠香攪糟為之但燒之煙散多此偽者是也真乳香與茯苓共嚼則成水又云􅔉山石乳香玲瓏而有蜂窩者為真毎􅅡之次􅅡沉檀之屬則香氣為乳香煙置定難散者是否則白膠香也薫陸香廣志云生南海又僻方即羅香也海藥夲草云味平温毒清神一名馬尾香是樹皮鱗甲採復生唐夲草云出天竺國及邯鄲似楓松脂黄白色天竺者多白邯鄲者夹綠色香不甚烈㣲温主伏尸惡氣療風水腫毒安息香夲草云出西戎樹形似松柏脂黄色為塊新者亦柔韌味辛苦無毒主心腹惡氣鬼疰後漢書西域𫝊安息國去雒陽二萬五千里比至康居其香乃樹皮膠燒之通神眀辟衆惡酉陽雜爼云出波斯國其樹呼為辟邪樹長三丈許皮色黄黑葉有四角經冬不凋二月有花黄色心㣲碧不結實刻皮出膠如飴名安息香葉庭珪云出三佛齊國乃樹之脂也其形色類胡􅊝瓤而不宜扵燒然能發衆香故多用之以和香焉温子皮云辨真安息香毎燒之以厚紙覆其上香透者是否則偽也篤耨香葉庭珪云出真臘國亦樹之脂也樹如松杉之類而香蔵扵皮樹老而自然流溢者也色白而透眀故其香雖盛暑不融土人既取之矣至夏月以火環其樹而炙之令其脂液再溢及冬月沍寒其凝而復取之故其香冬凝而夏融土人盛之以瓠瓢至暑月則鑚其瓢而周為孔藏之水中欲其隂凉而氣通以泄其汗故得不融舟人易以磁器不若扵瓢也其氣清逺而長或以樹皮相雜則色黒而品下矣香之性易融而暑月之融多滲扵瓢故斷瓢而􅅡之亦得其典型今所謂葫蘆瓢者是也瓢香𤨏碎錄云三佛齊國以匏瓢盛薔薇水至中國水盡碎其瓢而􅅡之與篤耨瓢畧同又名乾葫蘆片以之蒸香最妙金顔香西域𫝊云金顔香類薰陸其色赤紫其烟如凝漆沸超不甚香而有酸氣合沉檀為香焚之極清婉葉庭珪云出大食及真臘國所謂三佛齊出者盖自二國販至三佛齊三佛齊乃販入中國焉其香則樹之脂也色黄而氣勁善於聚衆香今之為龍涎軟者佩帶者多用之蕃之人多以和氣塗身詹糖香夲草云出晉安岑州及交廣以南樹似橘煎枝葉為之似糖而黑多以其皮及蠧糞雜之難得純正者惟輭乃佳蘓合香神農夲草云生中臺州谷陶𨼆居云俗𫝊是獅子糞外國説不爾今皆從西域来真者難别紫赤色如紫檀堅實極芬香重如石燒之灰白者佳主辟邪瘧癎鬼疰去三蟲西域𫝊云大秦國一名犂犍以在海西亦名雲漢海西國地方數千里有四百餘城人俗有類中國故謂之大秦國人合香謂之香煎其汁為蘓合油其津為蘓合油香葉庭珪云蘓合香油亦出大食國氣味類扵篤耨以濃净無滓者為上蕃人多以之塗身以閩中病大風者亦做之可合輭香及入藥用亞濕香葉庭珪云出占城國其香非自然乃土人以十種香𢷬和而成味温而重氣和而長􅅡之勝於他香塗肌拂手香葉庭珪云二香俱出真臘占城國土人以腦麝諸香𢷬和而成或以塗肌或以拂手其香經宿不歇惟五羊至今用之他國不尚焉雞舌香唐夲草云出崑崙國及交廣以南樹有雌雄皮葉並似栗其花如梅結實似棗核者雌樹也不入香用無子者雄樹也採花釀以成香香㣲温主心痛惡瘡療風毒去惡氣丁香山海經云生東海及崑崙國二三月開花七月方結實開寶夲草註云生廣州樹髙丈餘凌冬不凋葉似櫟而花圓細色黄子如丁長四五分紫色中有麤大長寸許者俗呼為母丁香擊之則順理拆味辛主風毒諸腫能發諸香及止心疼霍亂嘔吐甚騐葉庭珪云丁香一名丁子香以其形似丁子也雞舌香丁香之大者今所謂丁香母是也日華子云雞舌香治口氣所以三省故事郎官含雞舌香欲其奏事對答其氣芬芳至今方書為然出大食國鬱金香魏畧云生大秦國二三月花如紅藍四五月採之甚香十二葉為百草之英夲草拾遺云味苦無毒主蟲毒鬼疰鴉鶻等臭除心腹間惡氣入諸香用説文云鬱金香芳草也十葉為貫百二十貫採以煑之為鬯一曰鬱鬯百草之華逺方所貢方物合而釀之以降神也物類相感志云出伽毗國華而不實但取其根而用之迷迭香廣志云出西域魏文侯有賦亦嘗用夲草拾遺云味辛温無毒主惡氣今人衣香燒之去臭木宻香内典云状若槐樹異物志云其葉如椿交州記云樹似沉香夲草拾遺云味甘温無毒主辟惡去邪鬼疰生南海諸山中種之五六年乃有香藒車香夲草拾遺云味辛温主鬼氣去臭及蟲魚蛀物生彭城髙數尺黄葉白花爾雅云藒車䒗輿注曰香草也必栗香内典云一名化木香似老椿海葉夲草云味辛温無毒主鬼疰心氣痛斷一切惡氣葉落水中魚暴死木可為書軸碎白魚不損書艾蒳香廣志云出西域似細艾又有松樹皮上綠衣亦名艾蒳可以合諸香燒之能聚其煙青白不散夲草拾遺云味温無毒主惡氣殺蛀蟲主腹内冷洩痢一名石芝字統云香草也異物志云葉如栟櫚而小子似㯽榔可食兠婁香異物志云生海邊國如都梁香夲草云性㣲温療霍亂心痛主風水腫毒惡氣止吐逆亦合香用莖葉如水蘓今按此香與今之兠婁香不同白茅香夲草拾遺云味甘平無毒主惡氣令人身香煑汁服之主腹内冷痛生安南如茅根道家以之煑湯沐浴云茅香花唐夲草云生劔南諸州其莖葉黒褐色花白非白茅也味苦温無毒主中惡反胃止嘔吐葉苖可煑湯浴辟邪氣令人身香兠納香廣志云生驃國魏畧云出大秦國夲草拾遺云味甘温無毒去惡氣温中除冷耕香南方草木状云耕香莖生細葉夲草拾遺云味辛温無毒主臭鬼氣調中生烏滸國雀頭香夲草云即香附子也所在有之葉莖都是三稜根若附子周匝多毛交州者最勝大如棗核近道者如杏仁許荆襄人謂之莎草根大能下氣除腦腹中熱合和香用之尤佳芸香倉頡解詁曰芸蒿葉似邪蒿可食魚豢典畧云芸香辟紙魚蠧故藏書臺稱芸臺物類相感志云香草也説文云似苜蓿雜禮圖云芸即蒿也香美可食今江東人餌為生菜零陵香南越志云一名燕草又名薰草生零陵山谷葉如羅勒山海經云薰草麻葉而方莖赤花而黒實氣如蘼蕪可以止癘即零陵香本草云味苦無毒主惡氣注心腹痛下氣令體和諸香或作湯丸用得酒良都梁香荆州記云都梁縣有山山上有水其中生蘭草因名都梁香形如藿香古詩愽山罏中百和香鬱金蘓合及都梁廣志云都梁在淮南亦名煎澤草也白膠香唐本草云樹髙大木理細鞭葉三角商洛間多有五月斫為坎十二月收脂經史類證本草云楓樹所在有之南方及闗陕尤多樹似白楊葉圓而岐二月有花白色乃連著實大為鳥􅆑八九月熟曝乾可燒開寶本草云味辛苦無毒主癮疹風痒浮腫即楓香脂也芳草本草云即白芷也一名茝又名莧又名符離一名澤芬生下濕地河東州谷尤勝近道亦有之道家以此香浴去尸蟲龍涎香葉庭珪云龍涎出大食國其龍多蟠伏於洋中之大石卧而吐涎涎浮水面人見烏林上異禽翔集衆魚游泳爭􅏐之則殳取焉然龍涎本無香其氣近於臊白者如百藥煎而膩理黑者亞之如五靈脂而光澤能發衆香故多用之以和香焉潜齋云龍涎如膠毎兩與金等舟人得之則巨富矣温子皮云真龍涎燒之置杯水於側則煙入水假者則散嘗試之有騐甲香唐本草云蠡類生雲南者大如掌青黄色長四五寸取殻燒灰用之南人亦煑其肉噉今合香多用謂能發香復末香煙傾酒宻煑製方可用法見後温子皮云正甲香本是海螺壓子也唯廣南来者其色青黄長三寸河中府者只濶寸餘嘉州亦有如錢様大於木上磨令􅉯即投釅酒中自然相近者是也若合香偶無甲香則以鱟殻代之其勢力與中香均尾尤好麝香唐本草云生中臺川谷及雍州益州皆有之陶𨼆居云形類麞常食柏葉及噉蛇或於五月得者往往有蛇骨主辟邪殺鬼精中惡風毒療蛇傷多以當門一子真香分揉作三四子括取血膜雜以餘物大都亦有精麤破皮毛共在裹中者為勝或有夏食蛇蟲多至寒者香滿入春患急痛自以脚剔出人有得之者此香絶勝帶麝非但取香亦以辟惡其真香一子着腦間枕之辟惡夢及尸痊鬼氣或𫝊有水麝臍其香尤美洪氏云唐天寶中廣中獲水麝臍香皆水也毎以針取之香氣倍於肉臍倦遊錄云商汝山多羣麝所遺糞嘗就一處雖逺逐食必還走之不敢遺迹他處慮為人獲人反以是求得必掩羣而取之麝絶愛其臍毎為人所逐勢急即自投髙嵓舉爪裂出其香就縶而死猶拱四足保其臍李商𨼆詩云逐巖麝香退麝香木葉庭珪云出占城國樹老而仆埋於土而腐外黒肉黄赤者其氣類於麝故名焉其品之下者盖縁伐生樹而取香故其氣惡而勁此香實腫朧尤多南人以為器皿如花梨木類麝香草述異記云麝香草一名紅蘭香一名金桂香一名紫述香出蒼梧鬱林郡今吳中亦有麝香草似紅蘭而甚香最宜合香麝香檀𤨏碎錄云一名麝檀香盖西山樺根也􅅡之類煎香或云衡山亦有不及南者梔子香葉庭珪云梔子香出大食國状如紅花而淺紫其香清越而醖藉佛書所謂薝蔔花是也段成式云西域薝蔔花即南花梔子花諸花少六出惟梔子花六出蘓頌云梔子白花六出甚芬香刻房七稜至九稜者為佳野悉宻香潜齋云出佛林國亦出波斯國苖長七八尺葉似梅四時敷榮其花五出白色不結實花開時徧野皆香與嶺南詹糖相類西域人常採其花壓以為油甚香滑唐人以此和香㦯云薔薇水即此花油也亦見雜爼薔薇水葉庭珪云大食國花露也五代時蕃将蒲訶散以十五瓶効貢厥后罕有至者今則採末利花蒸取其液以代焉然其水多偽雜試之當用琉璃瓶盛之翻揺數四其泡自上下者為真後周顯徳五年昆明國獻薔薇水十五瓶得自西域以之灑衣衣敝而香不㓕甘松香廣志云生涼州夲草拾遺云味温無毒主鬼氣卒心腹痛漲滿發生細葉煑湯沐浴令人身香蘭香川本草云味辛平無毒主利水道殺蟲毒辟不祥一名水香生大吳池澤葉似蘭尖長有岐花紅白色而香俗呼為䑕尾香煑水浴治風木犀香向余異苑圖云巖桂一名七里香生匡廬諸山谷間八九月開花如棗花香滿巖谷採花陰乾以合香甚奇其木堅韌可作茶品紋如犀角故號木犀馬蹄香本草云即杜蘅也葉似葵形如馬蹄俗呼為馬蹄香藥中少用惟道家服令人身香蘹香本草云即茴香葉細莖麤髙者五六尺叢生人家庭院中其子療風蕙香廣志云蕙草綠葉紫花魏武帝以為香燒之蘼蕪香本草云蘼蕪一名薇蕪香草也魏武帝以之藏衣中荔枝香通志草木畧云荔枝亦曰離枝始𫝊於漢世初出嶺南後出蜀中今閩中所産甚盛南海藥譜云荔枝􅍄人未採則百蟲不敢近纔採之則烏鳥蝙蝠之類無不殘傷今以形如丁香如鹽梅者為上取其殻合香甚清馥木蘭香類證本草云生零陵山谷及太山一名林蘭一名杜蘭皮似桂而香味苦寒無毒主眀耳目去臭氣陶𨼆居云今諸處皆有樹類如楠皮甚薄而味辛香益州者皮厚状如厚朴而氣味為勝今東人皆以山桂皮當之亦相類道家用合香通志草木畧云世言魯般刻木蘭舟在七里洲中至今尚存凡詩所言木蘭即此耳𤣥臺香一名𤣥參本草云味苦寒無毒眀目定五臓生河南州谷及冤句三四月採根暴乾陶𨼆居云今出近道處處有之莖似人參而長大根甚黒亦㣲香道家時用亦以合香圖經云二月生苗葉似脂麻又視如栁細莖青紫顫風香今按此香乃占城之至精好者盖香樹交枝曲榦兩相戞磨積有嵗月樹之精液菁英結成伐而取之老節油透者亦佳潤澤頗類蜜清者最佳熏衣可經累日香氣不止今江西道臨江路清江鎮以此香為香中之甲品價常倍於他香伽䦨木一作伽藍木今按此香本出迦闌國亦占香之種也㦯云生南海補陀巖盖香中之至寶其價與金等排香安南志云好事者多種之五六年便有香也今按此香亦占香之大片者又謂之夀香盖獻夀者多用之紅兠婁香今按此香即麝檀香之别也大食水今按此香即大食國薔薇露也本土人毎蚤起以爪甲於花上取露一滴置耳輪中則口眼耳鼻皆有香氣終日不散孩兒香一名孩兒土一名孩兒泥一名烏爺土今按此香乃烏爺國薔薇樹下土也本國人呼曰海今訛傳為孩兒盖薔薇四時開花雨露滋沐香滴於土凝如菱角塊者佳今人合茶餅者往往用之紫茸香一名狨香今按此香亦出沉速香之中至薄而膩理色正紫黑焚之雖數十􅇍猶聞其香或云沉之至精者近時有得此香因禱祠􅅡於山上而下上數里皆聞之珠子散香滴乳香之至瑩净者喃吺哩香喃吺哩國所産降真香也熏華香今按此香盖以海南降真劈作薄片用大食薔薇水浸透於甑内蒸乾慢火􅅡之最為清絶樟鎮所售尤佳欖子香今按此香出占城國盖占香樹為蟲蛀鏤香之英華結子水心中蟲所不能蝕者形如橄欖核故名焉南方花余向云南方花皆可合香如末利闍提佛桑渠那香花本出西域佛書所載其後𫝊夲来閩嶺至今遂盛又有大含笑花素馨花就中小含笑香尤酷烈其花常若菡萏之未敷者故有含笑之名又有麝香花夏開與真麝無異又有麝真無異又有麝香末亦類麝氣此等皆畏寒故此地莫能植也或𫝊吳家香用此諸花合温子皮云素馨末利摘下花蕋香纔過即以酒噀之復香凡是生香蒸過為佳毎四時遇花之香者皆次次蒸之如梅花瑞香酴醿宻友梔子末利木犀及橙橘花之類皆可蒸他日􅅡之則羣花之香畢備花熏香訣用好降真香結實者截斷約一寸許利刀劈作薄片以豆腐漿煑之俟水香去水又以水煑至香味去盡取出再以末茶或葉茶煑百沸漉出陰乾隨意用諸花熏之其法以净瓦缶一箇先鋪花一層鋪香片一層鋪花一層及香片如此重重鋪盖了以油紙封口飯甑上蒸少時取起不得解待過數日取燒則香氣全矣或以舊竹辟蔶依上煑製代降採橘葉搗爛代諸花熏之其香清若春時曉行山徑所謂草木真天香殆此之謂香草名釋遯齋閒覽云楚辭所詠香草曰蘭曰蓀曰茝曰葯曰䖀曰芷曰荃曰蕙曰蘼蕪曰江蘺曰杜若曰杜蘅曰藒車曰蒥荑其類不一不能盡識其名状釋者但一切謂之香草而已其間一物而備數名者亦有與今人所呼不同者如蘭一物𫝊謂有國香而諸家之説但各以色自相非毁莫辨其真或以為都梁或以為澤蘭或以蘭草今當以澤蘭為正山中又有一種葉大如麥門冬春開花甚香此别名幽蘭也蓀則澗溪中所生今人所謂石菖蒲者然實非菖蒲葉柔脆易折不若蘭蓀之堅勁雜小石清水植之盆中久而鬱茂可愛茝葯䖀芷雖有四名而祗是一物今所謂白芷是也蕙即零陵也一名薰蘼蕪即芎窮苗也一名江蘺杜若即山薑也杜蘅今人呼為馬蹄香惟荃與藒車蒥荑終莫能識騷人類以香草比君子耳他日求田問舍當求其本列植欄檻以為楚香亭欲為芬芳滿前終日幽對相見騷人之雅趣以寓意耳通志草木略云蘭即蕙蕙即薰薰即零陵香楚辭云滋蘭九畹種蕙百畞互言也古方謂之薫草故名醫别錄出薫草條近方謂之零陵香故開寶本草出零陵香條神農本經謂之蘭余昔修本草以二條貫於蘭後眀一物也且蘭舊名煎澤草婦人和油澤頭故以名焉南越志云零陵香一名燕草又名薫草即香草生零陵山谷今潮嶺諸州皆有又别錄云薫草一名蕙草眀薫蕙之蘭也以其質香故可以為膏澤可以塗宫室近世一種草如茅葉而嫩其根謂之土續斷其花馥郁故得蘭名誤為人所賦詠澤芬曰白芷曰白􅉅曰䖀曰莞曰荷蘺楚人謂之葯其葉謂之蒿與蘭同徳俱生下濕澤蘭曰虎蘭曰龍棗曰虎蒲曰蘭香曰都梁香如蘭而莖方葉不潤生於水中名曰水香茈胡曰地薰曰山菜曰葭草葉曰芸蒿味辛可食生銀夏者芬馨之氣射於雲間多白􅀈青􅀈翺翔其上𤨏碎錄云古人藏書辟蠧用芸芸香草也今七里香是也南人採置席下能辟虱香草之類大率異名所謂蘭蓀即菖蒲也蕙今零陵香也􅉅今白芷也朱文公離騷註云蘭蕙二物本草言之甚詳大抵古之所謂香草必其花葉皆香而燥濕不變故可刈而為佩今之所謂蘭蕙則其花雖香而葉乃無氣其香雖美而質弱易萎非可刈佩也香異都夷香洞㝠記云香如棗核食一顆厯月不飢或投水中俄滿大盂也荼蕪香荼一作荼王子年拾遺記云燕昭王時廣延國進二舞人王以荼蕪香屑鋪地四五寸使舞人立其上彌日無迹香出波弋國浸地則土石皆香著朽木腐草莫不茂蔚以薫枯骨則肌肉皆香又見獨異志辟寒香辟寒香辟邪香瑞麟香金鳯香皆異國所獻杜陽雜編云自兩漢至皇唐皇后公主乗七寶輦四面綴五色玉香囊中貯上四香毎一出遊則芬馥滿道月支香瑞應圖云天漢二年月支國進神香武帝取視之状若燕卵凡三枚似棗帝不燒付外庫後長安中大疫宫人得疾衆使者請燒香一枚以辟疫氣帝然之宫中病者差長安百里内聞其香積數月不歇振靈香十洲記云生西海中聚窟洲大如楓而葉香聞數百里名曰返魂樹伐其根於玉釜中取汁如飴名曰驚精香又曰振靈香又曰返生香又曰馬積香又曰郤死香一種五名靈物也死者未滿三日聞香氣即活延和中月氐遣使貢香四兩大如雀卵黒如椹神精香洞冥記云波岐國獻神精香一名筌䕷草一名春蕪草一根百條其枝間如竹節柔輭其皮如絲可以為布所謂春蕪布亦曰香筌布又曰如冰紈握之一片滿身皆香􅶵臍香酉陽雜爼云出波斯國拂林呼為頂㪍梨咃長一丈餘一尺許皮色青薄而極光净葉似阿魏毎三葉生於條端無花結實西域人常以八月伐之至冬抽新條極滋茂若不翦除反枯死七月斷其枝有黄汁其状如蜜㣲有香氣入藥療百病兠末香本草拾遺云燒之去惡氣除病疫漢武故事云西王母降上燒是香兠渠國所献如大豆塗宫門香聞百里闗中大疫死者相枕藉燒此香疫即止内𫝊云死者皆起此則靈香非中國所致沈榆香封禪記云黄帝列珪玉於蘭蒲蓆上然沈榆香舂雜寶為屑以沈榆膠和之若泥以分尊卑華夷之位千畞香述異記云南郡有千畞香林名香往往出其中沈光香洞㝠記云塗魂國貢闇中燒之有光而堅實難碎太醫院以鐵杵舂如粉而燒之十里香述異記云千年松香聞扵十里威香孫氏瑞應圖云瑞草一名威㽔王者禮備則生扵殿前又云王者愛人命則生返魂香洪氏云司天主簿徐肇遇蘓氏子徳哥者自言善合返魂香手持香爐懐中取如白檀末撮於爐中烟氣裊裊直上甚於龍腦徳哥㣲吟曰東海徐肇欲見先靈願此香煙用為導引盡見其父母曾髙徳哥云但死八十年已前則不可返矣茵墀香拾遺記云靈帝熹平三年西域所獻煑為湯辟癘宫人以之沐浴餘汁入渠名曰流香之渠千步香述異記云出海南佩之香聞千步也今海隅有千步草是其種也葉似杜若而紅碧相雜貢籍云南郡貢千步香是也飛氣香三洞珠囊𨼆訣云真檀之香夜泉𤣥脂朱陵飛氣之香返生之香真人所燒之香五香三洞珠囊云五香樹一株五根一莖五枝一枝五葉一葉開五節五五相對故先賢名之五香之末燒之十日上徹九皇之天即青目香也雜修飬方云五月一日取五木煑湯浴令人至老鬢髪黑徐鍇注云道家以青木為五香亦名五木石葉香拾遺記云此香疊疊如雲母其氣辟癘魏文帝時題腹國所獻祗精香洞㝠記云出塗魂國燒此香魑魅精祗皆畏避雄麝香西京雜記云趙昭儀上姊飛燕三十五物有青木香沉木香九真雄麝香蘅蕪香拾遺記云漢武帝夢李夫人授以蘅蕪之香帝夢中驚起香氣猶著衣枕厯月不歇蘅薇香賈善翔髙道𫝊云張道陵母夫人自魁星中蘅薇香授之遂感而孕文石香洪氏云卞山在潮州山下産無價香有老姥拾得一文石光彩可翫偶墜火中異香聞於逺近收而寶之毎投火中異香如初金香三洞珠囊云司命君王易度遊於東坂廣昌之􅏾長樂之鄉天女灌以平露金香八㑹之湯珍瓊鳳𤣥脯百和香漢武内𫝊云帝於七月七日設坐殿上燒百和香張罽錦幛西王母乗紫雲車而至金磾香洞冥記云金日磾既入侍欲衣服香潔變羶酪之氣乃合一香以自薰武帝亦悦之百濯香拾遺記云孫亮為寵姬四人合四氣香皆殊方異國所獻凡經踐躡安息之處香氣在衣雖濯浣彌年不散因名百濯香復因其室曰思香媚寝芸輝香杜陽雜編元載造芸輝堂芸輝者香草也出于闐國其白如玉入土不朽為屑以塗壁九和香三洞珠囊云天人玉女𢷬羅天香持擎玉爐燒九和之香千和香三洞珠囊云峨嵋山孫真人然千和之香罽賓香盧氏雜説楊牧嘗召崔安石食盤前置香一爐烟出如樓臺之状崔别聞一香似非爐烟崔思之楊顧左右取白角楪子盛一漆毬子呈崔曰此罽賓國香所聞即此香也拘物頭花香唐實錄云太宗朝罽賓國進拘物頭花香香數十里聞龍文香杜陽雜編云武帝時所獻忘其國名鳯腦香杜陽雜編云穆宗嘗於藏真島前焚之以崇禮敬一木五香酉陽雜爼云海南有木根梅檀節沉香花鷄舌葉藿香花膠熏陸亦名衆木香昇霄靈香杜陽雜編云同昌公主薨上哀痛常令賜紫尼及女道士焚昇霄靈香擊歸天紫金之磬以導靈昇區撥香通典云頓遊國出藿香香挿枝便生葉如都梁以裛衣國有區撥等花冬夏不衰其花蕊更芬馥亦末為粉以傅其身焉大象藏香釋氏㑹要云因龍鬭而生若燒其香一丸興大光眀細雲覆上味如甘露也晝夜降其甘雨兠婁婆香楞嚴經云壇前别安一小爐以此香煎取香汁浴其炭然合猛熾多伽羅香釋氏㑹要云多伽羅香此云根香多摩羅跋香此香藿香梅檀譯云與樂即白檀也能治熱病赤檀能治風腫法華諸香法華經云須曼那華香闍提華香末利華香青赤白蓮華香華樹香果樹香檀香沈水香多摩羅跋香多伽羅香象香馬香男香女香拘鞞陀羅樹香曼陀羅華香硃沙華香曼殊妙華香牛頭㫋􅎶香華嚴經云從離垢出以之塗身火不能燒熏肌香洞㝠記云用熏人肌骨至老不病香石物類相感志云員嶠爛石色似肺燒之有香煙聞數百里煙氣升天則成香雲偏潤則成香雨亦見拾遺記懐夢草洞㝠記云鍾火山有香草武帝思李夫人東方朔獻之帝懐之夢見因名曰懐夢草一國香諸蕃記赤土國在海南出異香毎一燒一丸聞數百里號一國香龜中香述異記云即青桂香之善者羯布羅香西域記云其樹松身異華花果亦别初揉既濕尚未有香木乾之後循理而折之其中有香状如雲母色如冰雪亦名龍腦香逆風香波利質國多香樹其香逆風而聞靈犀香通天犀角鎊少末與沉香􅅡之煙氣裊裊直上能挟陰雲而睹青天故名抱樸子云通天犀角有白理如線置米羣雞中雞往啄米見犀輙驚散故南人呼為駭雞羣也玉㽔香好事集云栁子厚毎得韓退之所寄詩文必盥手熏以玉㽔香然後讀之脩製諸香飛樟腦樟腦一兩兩盞合之以濕紙糊縫文武火熁半時取起候冷用之沈譜樟腦不以多少研細用篩過細壁土拌勻捩薄荷汁少許灑在土上以净盌相合定濕紙條固四縫甑上蒸之腦子盡飛上盌底皆成冰片是齋售用樟腦石灰等分同研極細末用無油銚子貯之甆盌盖定四面以紙固濟如法勿令透氣底下用木炭火煆少時取開其腦子已飛在盌盖上用雞翎掃下再與石灰等分如前煆之凡六七次至第七次可用慢火煆一日而止取下掃腦子與杉木盒子鋪在内以乳汁浸兩宿固濟口不令透氣掘地四五尺窨一月不可入藥同上韶腦一兩滑石二兩一處同研入新銚子内文武火炒之上用一磁器盖之自然飛在盖上奪真篤耨篤耨黒白相雜者用盞底盛上飯甑蒸之白浮於面黒沉於下碎錄乳香乳香尋常用指甲燈草糯米之類同研及水浸鉢研之皆費力惟紙裹置壁隙中良久取研即粉碎又法於乳鉢下着水輕研自然成末或於火上紙裹略烘𤨏碎錄麝香研麝香湏著少水自然細不必羅也入香不宜用多及供佛神者去之龍腦龍腦湏别器研細不可多用多則撩奪衆香沈譜檀香須㨂真者剉如米粒許慢火煼令煙出紫色斷腥氣即止毎紫檀一斤薄作片子好酒二升以慢火煑乾畧煼檀香劈作小片臘茶清浸一宿焙乾以蜜酒同拌令勻再浸一宿慢火炙乾檀香細剉水一升白蜜半升同於鍋内煎五七十沸焙乾檀香斫作薄片子入蜜拌之净器爐如乾旋旋入蜜不住手攪動勿令炒焦以黒褐色為度以上並沈氏香譜沉香沉香細剉以絹袋盛懸於銚子當中勿令著底蜜水浸慢煑一日水盡更添今多生用藿香凡藿香甘松零陵之類須揀去枝梗雜草曝令乾燥揉碎揚去塵不可用水洗燙損香味也茅香茅香湏揀好者剉碎以酒蜜水潤一夜炒令黄燥為度甲香甲香如龍耳者好自餘小者次也取一二兩以来用炭汁一盌煑盡後用泥煑方同好酒一盞煑盡入蜜半匙爐如黄色黄泥水煑令透眀逐片净洗焙乾灰炭煑兩日净洗以蜜湯煑乾甲香以泔浸二宿後煑煎至赤珠頻沸令盡泔清為度入好酒一盞同煑良久取出用火炮色赤更以好酒一盞取出候乾刷去泥更入漿一碗煑乾為度入好酒一盞煑乾於銀器内炒令黄色甲香以灰煑去膜好酒煑乾甲香磨去齟齬以胡麻膏􅆈之色正黄則用蜜湯洗净入香宜少用鍊蜜白沙蜜若干綿濾入磁罐油紙重疊蜜封罐口大釡内重湯煑一日取出就罐於火上煨煎數沸便出盡水氣則經年不變若毎斤加蘓合油二兩更妙或少入朴硝除去蜜氣尤佳凡鍊蜜不可大過過則濃厚和香多不勻煆炭凡合香用炭不拘黒白重煆作火罨於宻噐冷定一則去炭中生薪一則去炭中雜穢之氣煼香宜慢火如火𦂳則焦氣沈譜合香合香之法貴於使衆香咸為一體麝滋而散撓之使勻沉實而腴碎之使和檀堅而燥揉之使膩比其性等其物而髙下如醫者則藥使氣味各不相掩𢷬香香不用羅量其精粗𢷬之使勻大細則煙不永太粗則氣不和若水麝婆律湏别器研之以上香史收香水麝忌暑婆律忌濕尤宜護持香雖多湏置之一器貴時得開闔可以診視窨香香非一體濕者易和燥者難調輕輭者燃速重實者化遲以火鍊結之則走洩其氣故必用净器拭極乾貯窨蜜掘地藏之則香性粗入不復離觧新和香必須窨貴其燥濕得宜也毎約香多少貯以不津甆器蠟紙封於静室屋中掘地窞深三五寸月餘逐旋取出其尤䭲馜也沈譜焚香焚香必於深房曲室矮卓置爐與人膝平火上設銀葉㦯雲母製如盤形以之襯香香不及火自然舒慢無煙燥氣香史熏香凡欲薰衣置熱湯於籠下衣覆其上使之沾潤取去别以爐􅅡香熏畢疊衣入箧笥隔宿衣之餘香數日不歇陳氏香譜卷一
