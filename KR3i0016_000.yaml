  text: 欽定四庫全書子部九
  hash: sha256:0bce925b640ea8fd115d42e34eba7e8dcf8661f4ed3df866ab1767c420beaed8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3i0016_WYG_000-1a, image: WYG0844/WYG0844-0239a.png}
body:
  text: 香譜譜錄類一器物之屬提要臣等謹案香譜四卷宋陳敬撰敬字子中河南人其仕履未詳首有至治壬戌熊朋來序亦不載敬之夲末是書凡集沈立洪芻以下十一家之香譜彚為一書徵引既繁不免以浩博為長稍踰限制若香名香品歴代凝和製造之方載之宜也至於經傳中字句偶涉而實非龍涎迷迭之比如卷首引左傳黍稷馨香等語寥寥數則以為溯源經傳殊為無謂此葢仿齊民要術首援經典之例而失之者也至於本出經典之事乃往往挂漏為鬱金香載説文之説而周禮鬱人條下鄭康成之註顧獨遺之則又舉逺而畧近矣然十一家之譜今不盡傳敬能薈稡羣言為之總滙佚文遺事多賴以𫝊要於考證不為無益也乾隆四十五年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀陳氏香譜原序香者五臭之一而人服媚之至於為香譜非世宦愽物嘗杭舶浮海者不能悉也河南陳氏香譜自子中至浩卿再世乃脱藁凡洪顔沈葉諸譜具在此編集其大成矣詩書言香不過黍稷蕭脂故香之為字從黍作甘古者從黍稷之外可焫者蕭可佩者蘭可鬯者鬱名為香草者無幾此時譜可無作楚辭所錄名物漸多猶未取於遐裔也漢唐以来言香者必取南海之産故不可無譜浩卿過彭蠡以其譜視釣者熊朋来俾為序釣者驚曰豈其乏使而及我子再世成譜亦不易宜遴序者豈無蓬莱玉署懐香握蘭之僊儒又豈無喬木故家芝蘭芳馥之世卿豈無島服夷言誇香詫寶之舶官又豈無神州赤縣進香受爵之少府豈無寶梵琳房聞思道韻之髙人又豈無瑶英玉蘂羅襦薌澤之女士凡知香者皆使序之若僕也灰釘之望既窮熏習之夢久斷空有廬山一峯以為罏峯頂片雲以為香子并收入譜矣毎憶劉季和香僻過罏熏身其主簿張坦以為俗坦可謂直諒之友季和能笑領其言亦庶幾善補過者有士於此如荀令君至人家坐席三日香梅學士毎晨袖覆罏撮袖以出坐定放香是富貴自好者所為未聞聖賢為此惜其不遇張坦也按禮經容臭者童儒所佩茝蘭者婦輩所采大丈夫則自流芳百世者在故魏武猶能禁家内不得熏香謝𤣥佩香囊則安石患之然琴牕書室不得此譜則無以治罏熏至於自熏知見抑存乎其人遂長揖謝客鼓棹去客追録為香譜序至治壬戌蘭秋彭蠡釣徒熊朋来序
