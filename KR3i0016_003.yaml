body:
  text: 陳氏香譜卷三宋陳敬撰凝和諸香韓魏公濃梅香又名返魂梅黑角沉半兩丁香一分鬱金半分小麥麩炒令赤色臘茶末一錢麝香一字定粉一米粒即韶粉是白蜜一盞右各為末麝先細研取臘茶之半湯點澄清調麝次入沉香次入丁香次入鬱金次入餘茶及定粉共研細乃入蜜使稀稠得宜收沙瓶器中窨月餘取燒久則益佳燒時以雲母石或銀葉襯之黃太史跋云余與洪上座同宿潭之碧湘門外舟中衡嶽花光仲仁寄墨梅二枝扣船而至聚觀于燈下余曰祗欠香耳洪笑發谷董囊取一炷焚之如嫩寒清曉行孤山籬落間怪而問其所得云自東坡得于韓忠獻家知余有香癖而不相授豈小鞭其後之意乎洪駒父集古今香方自謂無以過此以其名意未顯易之為返魂梅云香譜補遺所載與前稍異今併録之臘沉一兩龍腦半錢麝香半錢定粉二錢鬱金半兩胯茶末二錢鵝梨二枚白蜜二兩右先將梨去皮用薑擦子上擦碎細紐汁與蜜同熬過在一淨盞內調定粉臘茶鬱金香末次入沉香腦麝和為一塊油紙裹入瓷盒內地窨半月取出如欲遺人圓如芡實金箔為衣十丸作貼嵩州副宫李元老笑梅香沉香檀香白豆蔲仁香附子肉桂龍腦麝香金顔香各一錢白芨二錢馬牙硝二字荔枝皮半錢右先入金顔香于乳鉢內細研次入牙硝及腦麝研細餘藥别入杵臼內搗羅為末同前藥再入乳鉢內研滴水和劑印作餅子隂乾用或小印雕乾元亨利貞字印之佳笑梅香榅桲二個檀香半兩沉香三錢金顔香四錢麝香二錢半右將榅桲割開頂子以小刀子剔去穰并子將沉檀為極細末入于內將元割下頂子蓋著以麻縷繫定用生麵一塊裹榅桲在內慢火灰燒黃熟為度去麵不用取榅桲研為膏别將麝香金顔研極細入膏內相和研勻以木雕香花子印脫隂乾燒笑梅香沉香烏梅肉芎藭甘松各一兩檀香半兩右為末入腦麝少許蜜和瓷盒旋取焚之笑梅香棧香丁香甘松零陵香各二錢共為粗末朴硝四兩龍腦麝香各半錢右研勻次入腦麝朴硝生蜜搜和瓷盒封窨半月笑梅香丁香百粒茴香一兩檀香甘松零陵香麝香各二錢右細末蜜和成劑分爇之肖梅香韶腦四兩丁香皮四兩白檀二錢桐炭六兩麝香一錢右先搗丁檀炭為末次入腦麝熟蜜拌勻杵三五百下封窨半月取出爇之别一方加沉香一兩勝梅香歌曰丁香一分真檀半降真白檀松炭篩羅一兩灰熟蜜和勻入龍腦東風吹綻嶺頭梅鄙梅香沉香一兩丁香檀香麝香各二錢浮萍草右為末以浮萍草取汁加少蜜和捻餅燒之梅林香沉香檀香各一兩丁香枝杖樟腦各三兩麝香一錢右除腦麝别器細研將三味懷乾為末用煆過炭硬末二十兩與香末和勻白蜜四十兩重湯煮去浮蠟放冷旋入杵臼搗軟隂乾以銀葉襯燒之浹梅香丁香百粒茴香一捻檀香甘松零陵香各二兩腦麝少許右細末煉蜜作劑爇之笑蘭香白檀香丁香棧香玄參各一兩甘松半兩黃熟香二兩麝香一分右除麝香别研外餘六味同搗為末煉蜜搜拌成膏爇窨如常法笑蘭香沉香檀香白梅肉各一兩丁香八錢木香七錢牙硝半兩研丁香皮去粗皮二錢麝香少許白芨末右為細末白芨煮糊和勻入範子印花隂乾燒之李元老笑蘭香揀丁香味辛木香如雞骨沉香刮淨去軟白檀香脂膩肉桂味辛回紇香附子各一錢如無以白豆蔲代之以上六味同末麝香片白腦子各半錢南硼砂二錢先入乳鉢內研細次入腦麝同研右煉蜜和勻更入馬勃二錢許搜拌成劑新油單紙封裹入磁盒窨一百日取出旋丸如豌豆狀捻之漬酒名洞庭春每酒一斤入香一丸化開筍葉密封春三日夏秋一日冬七日可飲味甚清美靖老笑蘭香零陵香藿香甘松各七錢半當歸一條豆蔲一箇麝半錢檳榔一個木香丁香各半兩香附子白芷各二錢半右為細末煉蜜和搜入臼杵百下貯瓷盒地坑埋窨一月作餅燒如常法笑蘭香歌曰零藿丁檀沉木一六錢藳本麝差輕合和時用松花蜜爇處無煙分外清肖蘭香紫檀五兩白尤妙銼作小片煉白蜜一斤加少湯浸一宿取出銀器內炒微煙出麝香乳香各一錢烰炭一兩右先將麝香入乳鉢研細次用好臘茶一錢沸湯點澄清將腳與麝同研候勻以諸香相和入杵臼令得所如乾少加浸檀蜜水拌勻入新器中以紙封十數重地窨窞月餘可爇肖蘭香零陵香藿香甘松各七錢母丁香官桂白芷木香香附子各二錢玄參三兩沉香麝香各少許别研右煉蜜和勻捻作餅子燒之勝肖蘭香沉香拇指大檀香拇指大丁香一分丁香皮三兩茴香三錢甲香二十片製過樟腦半兩麝香半錢煤末五兩白蜜半斤右為末煉蜜和勻入瓷器內封窨旋丸爇之勝蘭香歌曰甲香一分煮三畨二兩烏沉三兩檀水麝一錢龍腦半異香清婉勝芳蘭秀蘭香歌曰沉藿零陵俱半兩丁香一分麝三錢細搗蜜和為餅爇秀蘭香似禁中傳蘭蕊香棧香檀香各三錢乳香一錢丁香三十粒麝香半錢右細末以蒸鵝梨汁和為餅子窨乾如常法蘭逺香沉香速香黃連甘松各一兩丁香皮紫藤香各半兩右為細末以蘇合油作餅爇之吳彥莊木犀香沉香一兩半檀香二錢半丁香五十粒各為末金顔香三錢别研不用亦可麝香少許入建茶清研極細腦子少許續入同研木犀花五盞已開未離披者吹入腦麝同研如泥右以少許薄麵糊入所研三物中同前四物和劑範為小餅窨乾如常法爇之智月木犀香白檀一兩臘茶浸煼木香金顔黑篤耨蘇合油麝香白芨末各一錢右為細末用皂兒膠鞭和入臼杵千下以花印脫之依法窨燒之木犀香降真香一兩銼屑檀香二錢别為末作臘茶半胯碎右以紗囊盛降真置磁器內用去核鳳棲梨或鵝梨汁浸降真及茶候軟透去茶不用拌檀末窨乾木犀香採木犀未開者以生蜜拌勻不可蜜多實捺入瓷器中地坑埋窨愈久愈奇取出于乳鉢內研勻成餅子油單裹收逐旋取燒採花時不得犯手剪取為妙木犀香日未出時乘露采巖桂花含蕊開及三四分者不拘多少煉蜜候冷拌和以溫潤為度緊築入有油瓷罐中以蠟紙密封罐口掘地坑深三尺許窨一月或二十日用銀葉襯燒之花大開即無香木犀香五更初以竹箸取巖桂花未開蕊者不拘多少先于瓶底入檀香少許方以花蕊入瓶候滿加梅花腦子糝花上皂紗幕瓶口置空所日收夜露四五次少用生熟蜜相半澆瓶中蠟紙封窨爇如常法木犀香沉香檀香各半兩茅香一兩右為末以半開木犀花十二兩擇去蒂研成膏搜作劑入石臼杵千百下脫花樣當風處隂乾爇之桂花香冬青樹子桂花香即木犀右以冬青樹子絞汁與桂花同蒸隂乾爐內爇之桂枝香沉香降真各等分右劈碎碎以水浸香上一指蒸乾為末蜜劑焚杏花香附子沉紫檀香棧香降真香各十兩甲香製薰陸香篤耨香塌乳香各五兩丁香木香各二兩麝半兩腦二錢右為末入薔薇水勻和作餅子以琉璃瓶貯之地窨一月爇之有杏花韻度杏花香甘松芎藭各半兩麝香少許右為末煉蜜和勻丸如彈子大置爐中旖旎可愛每迎風燒之尤妙吳顧道侍郎花白檀五兩細銼以蜜二兩熱湯化開浸香三宿取出于銀盤中紫色入杉木夫炭內炒同搗為末麝香一錢另研臘茶一錢湯點澄清用稠腳右同拌令勻以白蜜八兩搜和入乳鉢槌碎數百貯瓷器仍鎔蠟固縫地窨月餘可爇矣久則佳若合多可于臼中搗之百花香甘松去土棧香銼碎如米沉香臘茶末同煮半日玄參筋脈少者洗淨槌碎炒焦各一兩檀香半兩銼如豆以鵝梨二個取汁浸銀器內盛蒸三五次以汁盡為度丁香臘茶半錢同煮半日麝香另研縮砂仁肉豆蔲各一錢龍腦半錢研右為細末羅勻以生蜜搜和搗百卅杵捻作餅子入磁盒封窨如常法爇百花香歌曰三兩甘松别本作一兩一分芎别本作半兩麝香少許蜜和同丸如彈子爐中爇一似百花迎曉風野花香沉香檀香丁香丁香皮紫藤香懷乾各半兩麝香二錢樟腦少許杉木炭八兩研右以蜜一斤重湯煉過先研腦麝和勻入香搜蜜作劑杵數百磁盒地窨旋取捻餅子燒之野花香棧香檀香降真香各一錢舶上丁皮三分龍腦一錢麝香半字炭末半兩右為細末入炭末拌勻以煉蜜和劑捻作餅子地窨燒之如要煙聚入製過甲香一字即不散野花香棧香檀香降真香各三兩丁香皮一兩韶腦二錢麝香一字右除腦麝别研外餘搗羅為末入腦麝拌勻杉木炭三兩燒存性為末煉蜜和劑入臼杵三五百下瓷器內收貯旋取分爇之野花香大黃一兩丁香沉香玄參白檀寒水石各五錢右為末以梨汁和作餅子燒後庭花香檀香棧香楓乳香各一兩龍腦二錢白芨末右為細末以白芨作糊和勻脫花樣窨燒如常法洪駒父荔支香荔支殼不拘多少麝香一個右以酒同浸二宿封蓋飯上蒸之以為度臼中燥之搗末每十兩重加入真麝香一字蜜和作丸爇如常法荔支香沉香檀香白豆蔲仁西香附子肉桂金顔香各一錢馬牙硝龍腦麝香各半錢白芨新荔支皮各二錢右先將金顔香於乳鉢內細研次入牙硝入腦麝别研諸香為末入金顔研勻滴水和劑脫花爇柏子香柏子實不計多少帶青色未破未開者右以沸湯綽過細切以酒浸密封七日取出隂乾爇之酴醿香歌曰三兩玄參一兩松一枝楦子蜜和同少加真麝并龍腦一架酴醿落晚風黃亞夫野梅香降真香四兩臘茶一胯右以茶為末入井花水一碗與香同煮水乾為度莭去臘茶碾降真為細末加龍腦半錢和勻白蜜鍊令過熟搜作劑丸如雞頭大或散燒江梅香零陵香藿香丁香各半兩懷乾茴香半錢龍腦少許麝香少許乳鉢內研以建茶湯和洗之右為末鍊蜜和勻捻餅子以銀葉襯燒之江梅香歌曰百粒丁香一撒茴麝香少許可堪裁更加五味零陵葉百斛濃熏江上梅蠟梅香沉香檀香各三錢丁香六錢龍腦半錢麝香一錢右為細末生蜜和劑爇之雪中春信沉香一兩白檀丁香木香各半兩甘松藿香零陵香各七錢半回鶻香附子白芷當歸官桂麝香各三錢檳榔豆蔲各一枚右為末煉蜜和餅如棊子大或脫花樣燒如常法雪中春信香附子四兩鬱金二兩檀香一兩建茶煮麝香少許樟腦一錢石灰製羊脛炭四兩右為末煉蜜和勻焚窨如常法雪中春信檀香半兩棧香丁香皮樟腦各一兩二錢麝香一錢杉木炭二兩右為末煉蜜和勻焚窨如常法春消息丁香零陵香甘松各半兩茴香麝香各一分右為粗末蜜和得劑以磁盒貯之地坑內窨半月春消息丁香百粒茴香半合沉香檀香零陵香藿香各半兩右為末入腦麝少許和窨同前兼可佩帶春消息甘松一兩零陵香檀香各半兩丁香百顆茴香一撮腦麝各少許和窨並如前法洪駒父百步香又名萬斛香沉香一兩半棧香檀香以蜜酒湯少許别炒極乾製甲香各半兩别末零陵葉同研篩羅過龍腦麝香各三分右和勻熟蜜和劑窨爇如常法百里香荔支皮千顆須閩中來用鹽梅者甘松棧香各三兩檀香蜜拌炒黃色製甲香各半兩麝香一錢别研右細末煉蜜和令稀稠得所盛以不津器坎埋之半月取出爇之再投少許蜜捻作餅子亦可此蓋裁損聞思香也黃太史四香沉檀為主每沉二兩半檀一兩斫小博骰取榠查液漬之液過指許三日乃煮瀝其液溫水沐之紫檀為屑取小龍茗末一錢沃湯和之漬晬時包以濡竹紙數熏炮之螺甲半兩弱磨去齟齬以胡麻膏熬之色正黃則以蜜湯遽洗之無膏氣乃已青木香末以意和四物稍入婆律膏及麝二物惟少以棗肉合之作模如龍涎香狀日暵之意可海南沉水香三兩得火不作柴桂煙氣者麝香檀一兩切焙衡山亦有之宛不及海南來者木香四錢極新者不焙玄參半兩銼煼炙甘草末二兩焰硝末一錢甲香一錢浮油煎令黃色以蜜洗去油復以湯洗去蜜如前治法而末之婆律膏及麝各三錢别研香成旋入以上皆末之用白蜜六兩熬去沫取五兩和香末勻置瓷盒如常法山谷道人得之于東溪老東溪老得自厯陽公多方初不知其所自始名宜愛或曰此江南宫中香有美人字曰宜甚愛此香故名宜愛不知其在中主後主時耶香殊不凡故易名意可使衆業力無度量之意鼻孔繞二十五有求覔增上必以此香為可何沉酒欵玄參茗熬紫檀鼻端已霈然平直是得無生意者觀此香莫處處穿透亦必為可耳深靜海南沉香二兩羊脛炭四兩沉水銼如小博骰入白蜜五兩水解其膠重湯慢火煮半日許浴以溫水同炭杵為末馬尾篩下之以煮蜜為劑窨四十九日出之入婆律膏三錢麝一錢以安息香一分和作餅子亦得以瓷盒貯之荆州歐陽元老為余處此香而以一斤許贈别無老者其從師也能受匠石之斤其為吏也不銼庖丁之仞天下可人也此香恬淡寂寞非世所尚時時下帷一炷如見其人小宗海南沉水香一分銼棧香半兩銼紫檀三分半生用銀石器妙令紫色三物皆令如鋸屑蘇合油二錢製甲香一錢末之麝一錢半研玄參半錢末之鵝梨二枚取汁青棗二十枚水二碗煮取小半盞同梨汁浸沉棧檀煮一伏時緩火取令乾和入四物煉蜜令小冷搜和得所入瓷盒窨一日南陽宗少文嘉遁江湖之間援琴作金石弄逺山皆與之應聲其文獻足以配古人孫茂深亦有祖風當時貴人欲與之遊不可得乃使陸探微畫其像挂壁間觀之茂深惟喜閉閣焚香遂作此饋之時謂少文太宗茂深小宗故名小宗香大宗小宗南史有傳藍成叔知府韻勝香沉香檀香麝香各一錢白梅肉焙乾稱丁香皮各半錢揀丁香五粒木香一字朴硝半兩别研右為細末與别研二味入乳鉢拌勻密器收每用薄銀葉如龍涎法燒之少歇即是硝融隔火氣以水勻澆之即復氣通氤氲矣乃鄭康道御帶傳於藍藍嘗括於歌曰沉檀為末各一錢丁皮梅肉減其半揀丁五粒木一字半兩朴硝柏麝拌此香韻勝以為名銀葉燒之火宜緩蘇韜光云每五科用丁皮梅肉各三錢麝香半錢重餘皆同且云以水滴之一炷可留三日元御帶清觀香沉香四兩金顔香别研石芝檀香各二錢半末龍涎二錢麝香一錢半右用井花水和勻䃮石䃮細脫花爇之脫浴香香附子蜜浸三日慢火焙乾零陵香酒浸一宿慢火焙乾各半兩橙皮焙乾楝花晒乾榠查核荔支殼各一兩右並精細揀擇為末加龍腦少許煉蜜拌勻入瓷盒封窨十餘日取燒文英香甘松藿香茅香白芷麝檀香零陵香丁香皮玄參降真香各二兩白檀香半兩右為末煉蜜半斤少入朴硝和香爇之心清香沉檀各一指大母丁香一分丁香皮三錢樟腦一兩麝香少許無縫炭四兩右同為末拌勻重湯煮蜜去浮泡和劑瓷器守窨瓊心香棧香半兩檀香一分臘茶清煮丁香三十粒麝香半錢黃丹一分右為末煉蜜和膏爇之又一方用龍腦少許大真香沉香一兩半白檀一兩細銼白蜜半盞相和蒸乾棧香二兩甲香一兩製腦麝各一錢研入右為細末和勻重湯煮蜜為膏作餅子窨一月燒大洞真香乳香白檀棧香丁皮沉香各一兩甘松半兩零陵香右細末煉蜜和膏爇之天真香沉香三兩銼丁香新好麝香木銼炒各一兩玄參洗切微炒香生龍腦各半兩别研麝香三錢另研甘草末二錢焰硝少許甲香一分製過右為末與腦麝和勻用白蜜六兩煉去泡沫入焰硝及香末丸如雞頭大爇之熏衣最妙玉蕊香一名百花香白檀丁香棧香玄參各一兩甘松半兩淨黃熟香二兩麝一分煉蜜為膏和窨如常法玉蕊香玄參半斤銀器內煮乾再炒令微煙出甘松四兩白檀二兩銼右為末真麝香乳香各二錢研入煉蜜丸芡子大玉蕊香白檀四兩丁香皮八錢韶腦四錢安息香一錢桐木夫炭四錢腦麝少許右為末煉蜜劑油紙裹瓷器貯之入窨半月廬陵香紫檀七十二銖即三兩屑之蒸一兩半棧香十二銖半兩沉香六銖一分麝香三銖一錢字蘇合香五銖二錢二分不用亦可甲香二銖半一錢製玄參末一銖半半錢右用沙梨十枚切片研絞取汁青州棗二十枚水二碗濃煎汁浸紫檀一夕微火煮滴入煉蜜及焰硝各半兩與諸香研和窨一月爇之康漕紫瑞香白檀一兩錯末羊脛骨炭半稱搗羅右用蜜九兩瓷器重湯煮熟先將炭煤與蜜搜勻次入檀末更用麝香半錢或一錢别器研細以好酒化開灑入前件藥劑入瓷罐封窨一月旋取爇之久窨尤佳靈犀香雞舌香八錢甘松三錢靈靈香各一兩半右為末蜜煉和劑窨燒如常法仙茰香甘菊蕊乾檀香靈靈香白芷各一兩腦麝各少許乳鉢研右為末以梨汁和劑作餅子晒乾降仙香檀香末四兩蜜少許和為膏玄參甘松各二兩川靈靈一兩麝少許右為末以檀香膏子和之如常法窨爇可人香歌曰丁香一分沉檀半腦麝二錢中半良二兩烏香杉炭是蜜丸爇處可人香禁中非煙歌曰腦麝沉檀俱半兩丁香一分桂三錢蜜丸和細為團餅得自宣和禁闥傳禁中非煙沉香半兩白檀四兩劈作十塊胯茶浸少時丁香降真鬱金甲香各二兩製右為細末入麝少許以白芨末滴水和捻餅窨爇復古東闌雲頭香占臘沉香十兩金顔香拂手香各二兩蕃梔子别研石芝各一兩梅花腦一兩半龍涎麝香各一兩製甲香半兩右為末薔薇水和勻如無以淡水和之亦可用䃮石䃮之脫花如常法爇崔賢妃瑤英香沉香四兩金顔香二兩半拂手香麝香石芝各半兩右為細末上石和䃮捻餅子排銀盞或盤內盛夏烈日晒乾以新軟刷子出其光貯於錫盒內如常法爇之元若虛捴管瑤英勝龍涎一兩大食梔子二兩沉香十兩上等梅花腦七錢麝香當門子半兩右先將沉香細銼䃮令極細方用薔薇水浸一宿次日再上䃮三五次别用石䃮龍腦等四味極細方與沉香相合和勻再上石䃮一次如水多用紙滲令乾濕得所韓鈐轄正德香上等沉香十兩梅花片腦蕃梔