略噴碗盛蒸少時用三賴子二錢豆腐漿蒸以盞蓋定檀一錢細銼合和令勻入麝香少許香爨零陵香茅香藿香甘松松子捶碎茴香三賴子豆腐同蒸過檀香木香白芷土白芷肉桂丁香丁皮牡丹皮沉香各等分麝香少許右用好酒噴過日晒乾以剪刀切碎碾為生料篩羅粗末瓦罈收頓軟香丁香加木香少許同炒心子紅若作黑色不用沉香各一兩白檀金顔黃蠟三賴子各二兩龍腦半兩三錢亦可蘇合油不拘多少生油少許白膠香半斤灰水於沙鍋內煮候浮上晷掠入涼水搦塊再用皂角水三四盞以香色白為度稱二兩入香用右先將蠟於定磁器內溶開次下白膠香次生油次蘇合油攪勻取碗置地候大溫入衆香每一兩作一丸更加烏篤耨一兩尤妙如造黑色者不用心子紅入香墨二兩燒紅為末和劑如前法可懷可佩可置扇柄把握軟香篤耨香檀香末麝香各半兩金顔香五兩牙子香為末蘇合油三兩銀硃一兩龍腦三錢右為細末用瓷器或銀器于沸湯鍋內頓放逐旋傾入蘇合油攪和停勻為度取出㵼入水中隨意作劑軟香沉香十兩金顔香棧香各二兩丁香一兩乳香半兩龍腦一兩半麝香三兩右為細末以蘇合油和納磁器內重湯煮半日以稀稠得中為度以臼杵成劑軟香沉香為細末金顔香各半斤細末蘇合油四兩龍腦一錢細研右先以沉香末和蘇合油仍以冷水和成團却搦去水入金顔香龍腦又以水和成團再搦去水入臼用杵三五千下時時搦去水以水盡杵成團有光色為度如欲鞭更加金顔香如欲軟加蘇合油軟香上等沉香末五兩金顔香二兩半龍腦一兩右為末入蘇合油六兩半用綿濾過取淨油和香旋旋看稀稠得所入油如欲黑色加百草霜少許軟香沉香檀香棧香各三兩亞息香梅花龍腦甲香製松子仁各半兩金顔香龍涎麝各一錢篤耨油隨分杉木炭以黑為度右除腦麝松仁篤耨外餘皆取極細末以篤耨油與諸香和勻為劑廣州吳家軟香金顔香半斤研細蘇合油二兩沉香一兩末腦麝各一錢别研黃蠟二錢芝麻油一錢臘月者經年尤佳右將油蠟同銷鎔放令微溫和金顔沉末令勻次入腦麝與蘇合油同搜仍于淨石版上以木槌擊數百下如常法用之翟仲仁運使軟香金顔香半兩蘇合油三錢腦麝各一匙烏梅肉二錢半焙乾右先以金顔腦麝烏梅肉為細末後以蘇合油相合和臨時相度鞭軟得所欲色紅加銀硃二錢半欲色黑加皂兒灰三錢存性寶梵院主軟香沉香二兩金顔香半斤細末龍腦四錢麝香二錢蘇合油二兩半黃蠟一兩半右細末蘇合與蠟重湯鎔和搗諸香入腦子更杵千餘下軟香金顔香半斤極好者貯銀器用湯煮花細布紐淨研蘇合油四兩龍腦一錢研細麝香半錢研細心紅不計多少色紅為度右先將金顔香搦去水銀石銚內化開次入蘇合油麝香拌勻續入龍腦心紅移銚去火攪勻取出作團如常法軟香黃蠟半斤溶成汁濾淨却以淨銅銚內下紫草煎令紅濾去草滓檀香就鋪買細屑碾令細篩過二兩金顔三兩揀去雜物取淨稱别研細作一處滴乳香三兩揀明塊者用茅香煎水煮過令浮成片如膏須冷水中取出待水乾入乳鉢內細研如粘鉢則入煆過醋焠來底赭石二錢同研則不粘矣沉香半兩要極細末蘇合油二兩如結合時先以生蘿蔔擦了乳鉢則不粘無則代之生麝香三錢淨鉢內以茶清滴研細却以其餘香拌起一處銀硃隨意加入以紅為度右以蠟入器大碗內坐重湯中溶成汁入蘇合油和成了停勻却入衆香以栁棒極勻即香成矣欲軟用松子仁三兩揉汁於內雖大雪亦軟軟香檀香一兩白梅煮銼碎為末沉香半兩丁香三錢蘇合油半兩金顔香二兩蒸如無揀好楓滴乳香一兩酒煮過代之銀硃隨意右諸香皆不見火為細末打和于甑上蒸碾成為香加腦麝亦可先將金顔碾為細末去滓軟香金顔香蘇合油各三兩篤耨油一兩二錢龍腦四錢麝香一錢銀硃四兩右先將金顔碾為細末去滓用蘇合油坐熱入黃蠟一兩坐化逐旋入金顔香坐過了腦麝篤耨油銀硃打和以軟筍籜包縳收黃則加蒲黃二兩緑則入緑二兩黑則入墨一二兩紫則入紫草各量多少加入以勻為度熏衣香茅香四兩細銼酒洗微蒸零陵香甘松各半兩白檀二錢錯末丁香二錢白乾三個焙乾取末右同為粗末入米腦少許薄紙貼佩之蜀主熏御衣香丁香棧香沉香檀香麝香各一兩甲香三兩製右為末煉蜜放冷令勻入窨月餘用如前見第一卷南陽宫主熏衣香蜘蛛香一兩香白芷零陵香縮砂仁各半兩丁香麝香當歸豆蔲各一分熏衣香沉香四兩棧香三兩檀香一兩半龍腦牙硝甲香各半兩灰水洗過浸一宿次用新水洗過復以蜜水去黃製用麝香一錢右除麝腦别研外同粗末煉蜜半斤和勻候冷入龍麝新料熏衣香沉香一兩棧香七錢檀香半錢牙硝一錢甲香一錢製如前豆蔲一錢米腦一錢麝香半錢右先將沉檀棧為粗末次入麝拌勻次入甲香並牙硝銀硃一字再拌煉蜜和勻上糝腦子用如常法千金月令熏衣香沉香丁香皮各二兩鬱金二兩細切蘇合香詹糖香各一兩同蘇合和作餅小甲香四兩半以新牛糞汁二升水三升和煮三分去二取出以淨水淘刮去上肉焙乾又以清酒二升蜜半合和煮令酒盡以物攪候乾以水洗去蜜暴乾另為末右將諸香末和勻燒熏如常法熏衣梅花香甘松舶上茴香木香龍腦各一兩丁香半兩麝香一錢右件搗合粗末如常法燒熏熏衣芬積香沉香二十五兩銼棧香銼檀香銼臘茶清炒黃甲香製法如前杉木烰炭各二十兩零陵葉藿香葉丁香牙硝各十兩米腦三兩研梅花龍腦二兩研麝香五兩研蜜十斤煉和香熏衣衙香生沉香銼棧香各六兩銼檀香銼臘茶清炒生牙硝各十二兩生龍腦研麝香各九兩研甲香六兩炭灰煮二日洗淨再加酒蜜同煮乾白蜜比香斤加倍用煉熟右為末研入腦麝以蜜搜和令勻燒熏如常法熏衣笑蘭香藿苓甘芷木茴丁茅賴芎黃和桂心檀麝牡皮加減用酒噴日晒絳囊盛零以蘇合油揉勻松茅酒洗三賴米泔浸大黃蜜蒸麝香逐裹脿入熏衣加薑蠶常帶加白梅肉塗傅諸香傅身香粉莢粉别研青木香麻黃根附子炮甘松藿香零陵香各等分右除莢粉外同搗羅為細末以生絹夾帶盛之浴罷傅身上拂手香白檀香三兩滋潤者銼末用蜜三錢化湯一盞許炒令水盡稍覺浥濕焙乾杵羅細末米腦一兩研阿膠一片右將阿膠化湯打糊入香末搜拌勻于木臼中搗三五日捻作餅子或脫花窨乾穿穴線懸于胸間梅真香零陵葉甘松白檀丁香白梅末各半兩腦麝少許右為細末糝衣傅身皆可用之香髮木犀油凌晨摘木犀花半開者揀去莖蒂令淨髙量一斗取清麻油一斤輕手拌勻捺瓷器中厚以油紙密封罐口坐于釜內以重湯煮一餉久取出安頓穩燥處十日後傾出以手沘其清液收之最要封閉最密久而愈香如此油勻入黃蠟為面脂馨香也香餅凡燒香用餅子須先燒令通赤置香爐內俟有黃衣生方徐徐以灰覆之仍手試火氣緊慢香餅軟炭三斤末蜀葵花或葉一斤半右同搗令粘勻作劑如乾更入薄麵糊少許彈子大捻作餅晒乾貯磁器內燒旋取用如無葵則炭末中拌入紅花滓同搗以薄糊和之亦可香餅堅硬羊脛炭三斤末黃丹定粉針沙牙硝各五兩棗一升煮爛去皮核右同搗拌勻以棗膏和劑隨意捻作餅子香餅木炭三斤末定粉黃丹各二錢右拌勻糯米為糊和成入鐡臼內細杵以圈子脫作餅晒乾用之香餅用櫟炭和柏葉葵菜橡實為之純用櫟炭則焦熟而易碎石餅太酷不用耐久香餅鞕炭末五兩胡粉黃丹各一兩右同搗細末煮糯米膠和勻捻餅子晒乾每用燒令赤炷香經久或以針沙代胡粉煮棗代粳米膠長生香餅黃丹四兩乾蜀葵花燒灰乾茄根各二兩燒灰棗半斤去核右為細末以棗肉研作膏同和勻捻作餅子窨晒乾置爐而火耐久不熄終日香餅羊脛炭一斤末黃丹定粉各一分針沙少許研勻右煮棗肉杵膏拌勻捻作餅子窨二日便于日中晒乾如燒香畢水中蘸滅可再用丁晉公文房七寶香餅青州棗一斤和核用木炭二升末黃丹半兩鐵屑二兩造針處有定粉細墨各一兩丁香二十粒右同搗為膏如乾時再加棗以模子脫作餅如錢許每一餅可經晝夜內府香餅木炭末一斤黃丹定粉各三兩針砂三兩棗半升右同末蒸棗肉杵作餅晒乾每一板可度終日賈清泉香餅羊脛炭一斤末定粉黃丹各四兩右用糯米粥或棗肉和作餅晒乾用常法茄􅀢燒夾存性棗肉同杵捻餅晒乾用之香煤近來焚香取火非竈下即蹈爐中者以之供神佛格祖先其不潔多矣故用煤以扶接火餅香煤乾竹筒乾栁枝燒黑灰各二兩鉛粉三錢黃丹三兩焰硝二錢右同為末每用匕許以燈爇於上焚香香煤茄葉不計多少燒灰存性取麵四兩定粉三十黃丹二十海金沙二十右同末拌勻置爐灰上紙點可終日香煤竹夫炭栁木炭各四兩黃丹粉各二錢海金沙一錢研右同為末拌勻捻作餅入爐以燈點著燒香香煤枯茄樹燒成炭於瓶內候冷為末每一兩入鉛粉二錢黃丹二錢半拌和裝灰中香煤焰硝黃丹杉木炭各等分為末糝爐中以紙撚點日禪師香煤杉木夫炭四兩竹夫炭鞕羊脛炭各二兩黃丹海金沙各半兩右同為末拌勻每用二錢置爐中紙燈點燒候透紅以冷灰薄覆閻資欽香煤柏葉多採之摘去枝梗淨洗日中曝乾銼碎不用墳墓間者入淨罐內以鹽泥固濟炭火煆之存性細研每用一二錢置香爐灰上以紙燈點候勻編焚香時時添之可以終日或燒柏子存性作火尤妙香灰細葉杉木枝燒灰用火一二塊養之經宿羅過裝爐每秋間採松鬚曝乾燒灰用養香餅未化石灰槌碎羅過鍋內炒令候冷又研又羅為之作香爐灰潔白可愛日夜常以火一塊養之仍須用蓋若塵埃則黑矣礦灰六分爐灰四錢和勻大火養灰爇性香蒲燒灰爐裝如雪紙灰石灰木灰各等分以米湯和同煆過勿令偏頭青朱紅黑煤土黃各等分雜于紙中裝爐名錦灰紙灰炒通紅羅過或稻粳燒灰皆可用乾松花燒灰裝香爐最潔茄灰亦可藏火火久不熄蜀葵枯時燒灰裝爐大能養火香品器香爐香爐不拘銀銅鐵錫石各取其便用其形或作狻猊獬豸鳬鴨之類計其人之當作頭貴穿窿可泄火氣置竅不用大都使香氣回薄則能耐久香盛盛即盒也其所用之物與爐等以不生澀枯燥者皆可仍不用生銅銅易腥漬香盤用深中者以沸湯㵼中令其氣蓊鬱然後置爐其上使香易著物香匙平灰置火則必用圓者分香抄末則必用鋭者香筯和香取香總宜用筯香壺或范金或埏為之用盛匕筯香罌窨香用之深中而掩上陳氏香譜卷三
