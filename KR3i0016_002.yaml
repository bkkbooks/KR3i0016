以錫盒貯之小龍涎香錦紋大黃一兩檀香乳香丁香𤣥參甘松各五錢右以寒水石二錢同為細末梨汁和作餅子爇之小龍涎香沉香一兩龍腦半錢右為細末以鵝梨汁作餅子爇之小龍涎香沉香一兩乳香一分龍腦半錢麝香半錢胯茶清研右同為細末以生麥門冬去心研泥和丸如桐子大入冷石模中脫花候乾瓷盒收貯如常法然吳侍郎龍津香白檀五兩細銼以臘茶清浸半月後蜜炙沉香四兩𤣥參半兩甘松一兩洗净丁香二兩木麝二兩甘草半兩炙甲香半兩製先以黃泥水煮次以蜜水煮復以酒煮各一伏時更以蜜少許炒焙焰硝三錢龍腦一兩樟腦一兩麝香一兩四味各别器研右為細末拌和勻煉蜜作劑掘地窨一月取燒龍泉香甘松四兩𤣥參二兩大黃一兩半麝香半錢龍腦二錢右搗羅細末煉蜜為餅子如常法爇之清心降真香紫潤降真香四十兩銼研棧香三十兩黃熟香三十兩丁香皮十兩紫檀三十兩銼碎以建茶細末一兩湯調以兩碗拌香令濕炒三時辰勿令黑藿香十兩麝香木十五兩揀甘草五兩焰硝半斤湯化開淘去滓熬成霜枰甘松十兩白茅香三十兩細銼以青州棗復炒令色變去十個新水三升同煮過及黑者止用十五兩龍腦一兩香成旋入右為細末煉蜜搜和令勻作餅爇之宣和內府降真香蕃降真香三十兩右銼作小片子以臘茶半兩末之沸湯同浸一日湯髙香一指為約來朝取出風乾更以好酒半碗蜜四兩青州棗五十個於瓷器內與香同煮至乾為度取出於不津瓷盒內收貯密封徐徐取燒其香最清也降真香蕃降真香切作片子以冬青樹子單布內絞汁浸香蒸過窨半月燒假降真香蕃降真香一兩劈作碎片藁本一兩水二碗銀石器內與香同煎右二味同煮乾去藁本不用慢火襯筠州楓香燒勝篤耨香棧香半兩黃連香三錢檀香三分降真香三分龍腦一字麝香一錢右以蜜和粗末爇之假篤耨香老柏根七錢黃連七錢别器研置丁香半兩降真香臘茶煮半日紫檀香一兩棧香一兩右為細末入米腦少許煉蜜和勻窨爇之假篤耨香檀香一兩黃連香三兩右為末拌勻橄欖汁和濕入瓷器收旋取爇之假篤耨香黃連香或白膠香以極髙煮酒與香同煮至乾為度收之可燒馮仲柔假篤耨香通明楓香三兩火上鎔開桂末一兩入香內攪勻白蜜三兩匙入香內右以蜜入香攪和令勻瀉於水中冷便可燒或欲作餅子乘熱捻成置水中假篤耨香楓香乳棧香檀香生香各一兩官桂丁香隨意入右為粗末蜜和冷濕瓷盒封窨月餘可燒江南李王煎沉沉香㕮咀蘇合油不拘多少右每以沉香一兩用鵝梨十枚細研取汁銀石器入甑蒸數次以稀為度或削沉香作屑長半寸許鋭其一端叢刺梨中炊一飲時梨熟乃出李王花浸沉沉香不拘多少銼碎取有香花蒸荼䕷木犀橘花或橘葉亦可福建末利花之類帶露水摘花一碗以瓷盒盛之紙蓋入甑蒸食頃取出去花留汗汁浸沉香日中暴乾如是者三以沉香透潤為度或云皆不若薔薇水浸之最妙華蓋香歌曰沉檀香附并山麝艾蒳酸仁分兩停煉蜜拌勻瓷器窨翠烟如蓋可中庭寶毬香艾蒳一兩松上青衣是也酸棗一升入水少許研汁搗成膏丁香皮檀香茅香香附子白芷棧香各半兩草豆蔲一枚去皮梅花龍腦麝香各少許右除腦麝别器研外餘皆炒過搗取細末以酸棗膏更加少許裊裊直上如線結為毬狀經時不散香毬石芝艾蒳各一兩酸棗肉半兩沉香一分甲香半錢製梅花龍腦半錢另研麝香少許另研右除腦麝同搗細末研棗肉為膏入熟蜜少許和勻捻作餅子燒如常法芬積香丁香皮硬木炭各二兩為末韶腦半兩另研檀香一分末麝香一錢另研右拌勻煉蜜和劑實在罐器中如常法燒芬積香沉香棧香藿香零陵香各一兩丁香一分木香四分半甲香一分製搗右為細末重湯煮蜜放溫入香末及龍腦麝香各二錢拌和令勻瓷盒密封地坑窨一月爇之小芬積香棧香一兩檀香樟腦各五錢飛過降真香一分麩炭三兩右以生蜜或熟蜜和勻瓷盒盛埋地一月取燒芬積香沉香二兩紫檀丁香各一兩甘松三錢零陵香三錢製甲香一分腦麝各一錢右為末拌勻生蜜和作劑餅瓷器窨乾爇之藏春香沉香檀香酒浸一宿乳香丁香真臘香占城香各二兩腦麝各一分右為細末將蜜入甘黃菊一兩四錢𤣥參三分銼同入餅內重湯煮半日濾去菊與參不用以白梅二十箇水煮令冷浮去核取肉研入熟蜜拌勻衆香於瓶內久窨可爇藏春香降真香四兩臘茶清浸三日次以湯浸煮十餘沸取出為末丁香十餘粒腦麝各一錢右為細末煉蜜和勻燒如常法出塵香沉香四兩金顔香四錢檀香三錢龍涎二錢龍腦一錢麝香五分右先以白芨煎水搗沉香萬杵别研餘品同拌令勻微入煎成皂子膠水再搗萬杵入石模脫作古龍涎花子出塵香沉香一兩棧香半兩酒煮麝香一錢共為末蜜拌焚之四和香沉檀各一兩腦麝各一錢如法燒香橙皮荔枝殼櫻桃核梨滓甘蔗滓等分為末名小四和四和香檀香二兩銼碎蜜炒褐黃色勿令焦滴乳香一兩絹袋盛酒煮取出研麝香一錢胯茶一兩與麝同研松木麩炭末半兩右為末煉蜜和勻磁盒收盛地窨半月取出爇之馮仲柔四和香錦文大黃𤣥參藿香葉蜜各一兩右用水和慢火煮數時辰許銼為粗末入檀香三錢麝香一錢更以蜜兩匙拌勻窨過爇之加减四和香沉香一分丁香皮一分檀香半分各别為末龍腦半分另研麝香半分木香不拘多少杵末沸湯浸水右以餘香别為細末木香水和捻作餅子如常爇之夾棧香夾棧香甘松甘草沉香各半兩白茅香二兩檀香二兩藿香一分甲香二錢製梅花龍腦二錢别研麝香四錢右為細末煉蜜拌和令勻貯瓷器蜜封地窨一月旋取出捻餅子爇如常法聞思香𤣥參荔枝松子仁檀香香附子各二錢甘草丁香各一錢同為末查子汁和劑窨爇如常法聞思香紫檀半兩蜜水浸三日慢火焙甘松半兩酒浸一日火焙橙皮一兩日乾苦楝花一兩榠查核一兩紫荔枝一兩龍腦少許右為末煉蜜和劑窨月餘爇之别一方無紫檀甘松用香附子半兩零陵香一兩餘皆同夀陽公主梅花香甘松半兩白芷半兩牡丹皮半兩藁本半兩茴香一兩丁皮一兩不見火檀香一兩降真香一兩白梅一百枚右除丁皮餘皆焙乾為粗末瓷器窨半月爇如常法李王帳中梅花香丁香一兩一分新好者沉香一兩紫檀半兩甘松半兩龍腦四錢零陵香半兩麝香四錢製甲香三分杉松麩炭四兩右細末煉蜜和勻丸窨半月取出爇之梅花香苦參四兩甘松四錢甲香三分製之用麝香少許右細末煉蜜為丸如常法爇之梅花香丁香一兩藿香一兩甘松一兩檀香一兩丁皮半兩牡丹皮半兩零陵香二兩辛夷一分龍腦一錢右為末用如常法尤宜佩帶梅花香甘松一兩零陵香一兩檀香半兩茴香半兩丁香一百枚龍腦少許别研右為細末煉蜜合和乾濕皆可爇之梅花香沉香檀香丁香各一分丁香皮三分樟腦三分麝香少許右除腦麝二味乳鉢細研入杉木炭煤四兩共香和勻煉白蜜拌勻捻餅入無滲瓷器窨久以銀葉或雲母襯燒之梅花香丁香枝杖一兩零陵香一兩白茅香一兩甘松一兩白檀香一兩白梅末二錢杏仁十五個丁香三錢白蜜半斤右為細末煉蜜作劑窨七日燒之梅英香揀丁香三錢白梅末三錢零陵香葉二錢木香一錢甘松半錢梅英香沉香三兩銼末丁香四兩龍腦七錢另研蘇合香二錢甲香二兩製硝石末一錢右細末入烏香末一錢煉蜜和勻丸如芡實爇之梅蘂香又名一枝香歌曰沉檀一分丁香半烰炭篩羅五兩灰煉蜜丸燒加腦麝東風吹綻十枝梅陳氏香譜卷二
