body:
  text: 陳氏香譜卷四宋陳敬撰香珠香珠之法見諸道家者流其來尚矣若夫茶藥之屬豈亦漢人含雞舌之遺製乎兹故録之以備聞見庶幾免一物不知之議云孫廉訪木犀香珠木犀花蓓蕾未開全者開則無香矣露未晞時先用布幔鋪地如無幔淨掃樹下地面令人登梯上樹打下花蕊收拾歸家擇去梗葉須精揀花蕊用中樣石磨磨成漿次以布復包裹榨壓去水將已乾花料盛貯新磁罐內逐旋取出於乳鉢內研令細軟用小竹筒為則度築劑或以滑石平片刻竅取則手握圓如小錢大竹籖穿孔置盤中以紙四五重襯藉日傍隂乾稍健百顆作一串小竹弓絣挂當風處次至八九分乾取下每十五顆以淨潔水略略揉洗去皮透青黑色又用盤盛於日影中暵乾如天氣隂晦紙隔之於幔火上焙乾新綿裹以時時取觀則香味可數年不失其磨乳員洗之際忌穢汚婦女銀器油鹽等觸犯瑣碎録云木犀香念珠須入少西木香龍涎香珠大黃一兩半甘松一兩三錢川芎一兩半牡丹皮一兩三錢藿香一兩三錢三奈子一兩三錢以上六味並用酒發留一宿次五更以後藥一處拌勻於露天安待日出晒乾用白芷二兩零陵香一兩半丁香皮一兩三錢檀香三兩滑石一兩三錢别研白芨六兩煮糊均香二兩炒乾白礬一兩三錢二味另研好棧香二兩秦皮一兩三錢樟腦一兩麝香半字右圓晒如前法旋入龍涎腦麝香珠天寶香一兩土光香半兩速香一兩蘇合香半兩牡丹皮一兩降真香半兩茅香一錢半草香一錢白芷二錢豆腐蒸過三奈子二分同上丁香半錢藿香五錢丁皮一兩藁本半兩細辛二分白檀一兩麝香檀一兩零陵香二兩甘松半兩大黃二兩荔枝殼二錢麝香不拘多少黃蠟一兩滑石量用石膏五錢白芨一兩右料蜜梅酒松子三奈白芷糊夏白芨春秋瓊枝冬阿膠黑色竹葉灰石膏黃色檀香蒲黃白色滑石麝菩提色細辛牡丹皮檀香麝檀檀大黃石膏沉香噀濕用蠟丸打輕者用水噀打香珠零陵香酒洗甘松酒洗茴香各等分丁香等分茅香酒洗木香少許藿香酒洗此項奪香味少川芎少許桂心少許檀香等分白芷麵裹燒熟去麵不用牡丹皮酒浸一日晒乾三奈子加白芷治少用大黃蒸過此項收香珠又且染色右件如前治度晒乾合和為細末用白芨末和麵打糊為劑隨大小圓趂濕穿孔半乾用麝香稠調水為衣收香珠法凡香環佩帶念珠之屬過夏後須用木賊草擦去汗垢庶不蒸壞若蒸損者以溫湯洗過晒乾其香如初香藥丁沉煎圓丁香二兩半沉香四錢木香一錢白豆蔲二兩檀香二兩甘草四兩右為細末以甘草熬膏和勻為圓如雞頭大每用一丸噙化常服調順三焦和養營衛治心胸痞滿木香餅子木香檀香丁香甘草肉桂甘松縮砂丁皮莪术各等分莪术醋煮過用鹽水浸出醋漿米浸三日為末蜜和同甘草膏為餅每服三五枚香茶經進龍麝香茶白豆蔲一兩去皮白檀末七錢百藥煎五錢寒水石五分薄荷汁製麝香四錢沉香三錢梨汁製片腦二錢半甘草末三錢上等髙茶一斤右為極細末用淨糯米半升煮粥以密布絞取汁置淨碗內放冷和劑不可稀軟以鞕為度於石版上杵一二時辰如粘􅀈用小油二兩煎沸入白檀香三五片脫印時以小竹刀刮背上令平孩兒香茶孩兒香一斤髙末茶三兩片腦二錢半或糖米者韶腦不用麝香四錢薄荷霜五錢川百藥煎一兩研細右五件一處和勻用熟白糯米一升半淘洗令淨入鍋內放水髙四指煮作糕麝取出十分冷定於磁盆內揉和成劑却于平石砧上杵千餘轉以多為妙然後將花脫子灑油少許入劑作餅于潔淨透風篩子頓放隂乾貯磁器內青紙襯裏密封附造薄荷霜法寒水石研極細末篩羅過以薄荷二斤加于鍋內傾水一碗于下以瓦盆蓋定用紙濕封四圍文武火蒸熏兩頓飯久氣定方開微有黃色嘗之涼者是香茶上等細茶一斤片腦半兩檀香三兩沉香一兩舊龍涎餅一兩縮砂三兩右為細末以甘草半斤銼水一碗半煎取淨汁一碗入麝香末三錢和勻隨意作餅香茶龍腦麝香雪梨汁製百藥煎楝草寒水石飛過末白豆蔲各三錢髙茶一斤硼砂一錢右同碾細末以熬過熟糯米粥淨布中絞取濃汁和勻石上杵千餘方脫花樣事類香尉漢仲雍子進南海香拜洛陽尉人謂之香尉述異記香户南海郡有採香户述異記海南俗以貿香為業東坡文集香市南方有香市乃商人交易香處述異記香洲朱崖郡洲中出諸異香往往有不知名者述異記香溪吳宫有香水溪俗云西施浴處又呼為脂粉塘吳王宫人濯袚于此溪上源至今猶香香界回香所生以香為界楞嚴經香篆鏤木為篆紋以之範香塵然於飲食或佛象前有至二三尺徑者洪譜香藹雕盤坡詞香珠以雜香搗之丸如梧桐子青繩穿之此三皇真元之香珠也燒之香徹天三洞珠囊香纓詩親結其褵注云褵香纓也女將嫁母結纓而戒之香囊晉謝玄常佩紫羅香囊謝安患之而不欲傷其意自戲賭取香囊焚之玄遂止又古詩云香囊懸肘後後蜀文淡生五嵗謂母曰有五色香囊在否林下往取得之乃淡前生五嵗失足落井今再生也並本傳香獸以塗金為狻猊麒麟鳬鴨之狀空中以焚香使煙以口出以為玩好復有雕木塊土為之者洪譜北里志書曰新團香獸不焚燒香童唐元寶好賓客務于華侈器玩服用僣于王公而四方之士盡仰歸焉常于寢帳牀前刻鏤童子人捧七寶博山香爐日暝焚香徹曙其驕貴如此天寶遺事香巖童子香巖童白佛言我諸比丘燒水沉香香氣寂然來入鼻中非木非空非煙非火去無所著來無所從由是意銷發明無漏得阿羅漢楞嚴經宗超香宗超嘗露壇行道奩中香盡自然滿溢爐中無火煙自出洪譜南蠻香訶陵國亦曰闍婆在南海中貞觀時遣使獻婆律膏又驃古朱波也有以名思利毗離芮土多異香王宫設金銀二爐冦至焚香擊之以占吉凶有巨白象髙數尺訟者焚香自跽象前自思是非而退有災疫至亦焚香對象跽自咎無膏油以蠟雜香代炷又真臘國客至屑檳榔龍腦以進不飲酒唐書南蠻傳棧槎番禺民忽于海旁得古槎長丈餘濶六七尺木理甚堅取為溪橋數年後有僧過而識之謂衆曰此非久計願捨衣鉢資易為石橋即求此槎為薪衆許之得棧香數千兩洪譜披香殿漢宫闕名長安有合歡殿披香殿郡國志採香徑吳王闔閭起響􅓏廊採香徑郡國志柏香臺漢武帝作柏香臺以柏香聞數十里本紀三清臺王審知之孫昶襲為閩王起三清臺三層以黃金鑄像日焚龍腦薰陸諸香數斤五代史十國世家沉香牀沙門支法有八尺沉香牀異苑沉香亭開元中禁中初重木芍藥即今牡丹也得四本紅紫淺紅通白者上因移植于興慶池東沉香亭前李白集敬宗時波斯國進沉香亭子拾遺李漢諫曰沉香為亭何異瓊臺瑤室本傳沉香堂隋越國公楊素大治第宅有沉香堂沉香火山隋煬帝每除夜殿前設火山數十皆沉香木根每一山焚沉香數車以甲煎沃之香聞數十里續世説沉香山華清溫泉湯中疊沉香為方丈瀛洲明皇雜録沉屑泥壁唐宗楚客造新第用沉香紅粉以泥壁每開户則香氣蓬勃洪譜檀香亭宣州觀察使楊牧造檀香亭子初成命賓落之杜陽編檀槽天寶中中官白秀貞自蜀使回得琵琶以獻其槽以沙檀為之溫潤如玉光耀可鑑李宣詩云琵琶聲亮紫檀槽麝壁南齊廢帝東昏侯塗壁皆以麝香雞石集麝枕置真麝香于枕中可絶惡夢續博物志龍香撥貴妃琵琶以龍香版為撥外傳龍香劑玄宗御案墨曰龍香劑一日見墨上有道士如蠅而行上叱之即呼萬嵗曰臣松墨使者也上異之陶家餘事香閣後主起臨春結綺望春三閣以沉檀香木為之陳書楊國忠嘗用沉香為閣檀香為欄檻以麝香乳香篩土和為泥飾閣壁每於春時木芍藥盛開之際聚賓於此閣上賞花焉禁中沉香亭逺不侔此壯麗也天寶遺事香牀隋煬帝於觀文殿前兩廂為堂十二間每間十二寶厨前設五方香牀綴貼金玉珠翠每駕至則宫人擎香爐在輦前行隋書香殿大明賦云香殿聚于沉檀豈待焚夫椒蘭黃萃卿水殿風來暗香滿坡詞五香席石季倫作席以錦裝五香雜以五綵編蒲皮緣七香車梁簡文帝詩云丹轂七香車椒殿唐宫室志有椒殿椒房應邵漢官儀曰后宫稱椒房以椒塗壁也椒漿桂醑兮椒漿離騷元日上椒酒於家長舉觴稱夀元日進椒酒椒是玉衡之精服之令人却老崔實月令蘭湯五月五日以蘭湯沐浴大戴禮浴蘭湯兮沐芳楚詞注云芳芷也蘭佩紉秋蘭以為佩楚詞注云佩也記曰佩帨􅉅蘭蘭畹既滋蘭之九畹又樹蕙之百畝同上蘭操孔子自衛反魯隱谷之中見香蘭獨茂喟然歎曰夫蘭當為王者香今乃獨茂與衆草為伍乃止車援琴鼓之自傷不逢時托辭於幽蘭云琴操蘭亭暮春之初會于會稽山隂之蘭亭王逸少敘蘭室黃帝傳岐伯之術書於玉版藏諸靈蘭之室素問蘭臺楚襄王逰于蘭臺之宫風賦龍朔中改祕書省曰蘭臺椒蘭養鼻椒蘭芬苾所以養鼻也前有澤芷以養鼻蘭槐之根是為芷注云蘭槐香草也其根名芷並荀子焚椒蘭煙斜霧橫焚椒蘭也杜牧之阿房宫賦懷香尚書省懷香握蘭趨走丹墀漢官儀含香漢桓帝時侍中刁存年老口臭上出雞舌香使含之香頗小辛螫不敢咽自疑有過賜毒也歸舍與家人辭訣欲就便宜衆求視其藥乃口香衆笑之更為含食意遂解漢官儀啖香唐元載寵姬薛瑶英母趙娟幼以香啖英故肌肉悉香杜陽編飯香維摩詰經畤化菩薩以滿鉢香與維摩詰飯香普薰毗耶離城及三千大千世界時維摩詰語舍利佛等諸大聲聞仁者可食如來甘露味飯大悲所熏無以限意食之使不消栁文注貢香唐貞觀中敕下度支求杜若省郎以謝玄暉詩云芳洲採杜若乃責坊州貢之通志分香魏王操臨終遺令曰餘香可分與諸夫人諸舍中無所為學作履組賣也三國志及文選賜香玄宗夜宴以琉璃器盛龍腦香數斤賜羣臣馮謐起進曰臣請效陳平為宰自丞相以下悉皆跪受尚餘其半乃捧拜曰欽賜録事馮謐玄宗笑許之熏香莊公束縳管仲以豫齊使而以退比至三釁三浴之注云以香塗身曰釁釁為熏齊語魏武帝令云天下初定吾便禁家內不得熏香三國志竊香韓夀字德真為賈充司空掾充女窺見夀而悅之目婢通殷勤夀踰垣而至時西域有貢奇香一著人經月不散帝以賜充其女密盜以遺夀後充與夀宴聞其芬馥計武帝所賜惟已及陳騫家餘無疑夀與女通乃取左右婢考問即以狀言充祕之以女妻夀晉書本傳愛香劉季和性愛香常如厠還輒過爐上主簿張垣曰人名公俗人不虛也季和曰荀令君至人家坐席三日香為我如何坦曰醜婦效顰見者必走公欲坦遁走耶季和大笑襄陽記喜香梅學士詢性喜焚香其在官所每晨起將視事必焚香兩爐以公服罩之撮其袖以出坐定撒開兩袖郁然滿室焚香時人謂之梅香歸日録天女擎香夫子當生之日有二蒼龍旦而下來附徴在房因夢而生夫子夫子當生時有天女擎香自空而下以沐浴徴在拾遺記三班喫香三班院所領使臣八千餘人涖事于外其罷而在院者常數百人每嵗乾元節醵錢飯僧進香合以祝聖夀謂之香錢京師語曰三班喫香歸田録露香告天趙清獻公抃衢州人舉進士官至參政平生所為事夜必衣冠露香九拜手告于天應不可告者則不敢為也言行録焚香祝天後唐明宗每夕于宫中焚香祝天曰某為衆所共推戴願早生聖人為生民主五代史帝記初廢帝入欲擇宰相于左右左右皆言盧文紀及姚顗有人望帝乃悉書清要姓名內琉璃瓶中夜焚香祝天以筯挾之首得文紀之名次得姚顗遂並相焉五代史本傳焚香讀章奏唐宣宗每得大臣章奏必盥手焚香然後讀之本紀焚香讀孝經岑之敬字由禮淳厚有孝行五嵗讀孝經必焚香正坐南史焚香讀易公退之暇戴華陽巾披鶴氅衣手執周易一卷焚香默坐消遣世慮王元之竹樓記焚香致水襄國城塹水源暴竭石勒問于佛圗澄澄曰今當敕龍取水乃至源上坐繩床燒安息香呪數百言水大至隍塹皆滿載記焚香禮神漢武故事昆邪王殺休屠王來降得其金人之神置之甘泉宫金人者皆長丈餘其祭不用牛羊惟燒香禮拜于吉精舍燒香燒道書三國志降香嶽瀆國朝每嵗分遣驛使賫御香有事于五嶽四瀆名山大川循舊典也廣州之南海道八十里扶胥之口黃木之灣南海祝融之廟也嵗二月朝遣使馳馹有事于海神香用沉檀具牲幣使初獻其亞獻終獻各以官攝行三獻三奏樂主者以祝文告于前禮畢使以餘香分給焚香靜坐人在家及外行卒遇飄風暴雨震電昏暗大霧皆諸龍神經過宜入室閉户焚香靜坐避之不爾損人溫子皮燒香勿返顧南嶽夫人云燒香勿返顧忤真氣致邪應也真誥燒香辟瘟樞密王博文每于正旦四更燒丁香以辟瘟氣瑣碎録燒香引鼠印香五文狼糞少許為細末同和勻于淨室內以爐燒之其鼠自至不得殺戲術求名如燒香人隨俗求名譬如燒香衆人皆聞其香不知薰以自焚盡則氣滅名文則身絶真誥五色香煙許逺逰燒香皆五色香煙出三洞珠囊香奩韓偓香奩集自敘云咀五色之靈芝香生九竅咽三清之瑞露春動七情古詩云開奩集香蘇防蠧辟惡生香聊防羽陵之蠧玉臺新詠序除邪地上魔邪之氣直上沖天四十里人燒青木薰陸安息膠于寢室披濁臭之氣却邪穢之霧故夫人玉女太一帝皇隨香氣而來下洪譜香玉辟邪唐肅宗賜李輔國香玉辟邪二玉之香可聞數里輔國每置之坐隅一日輔國方巾櫛一忽大笑一忽悲啼輔國碎之未幾事敗為刺客所殺杜陽編香中忌麝唐鄭注赴河中姬妾百餘盡熏麝香氣數里逆于人鼻是嵗自京兆至河中所過之地瓜盡一蒂不獲洪譜被草負笈宋景公燒異香於臺有野人被草負笈扣門而進是為子常世司天部洪譜異香成穗二十二祖摩挲羅至西印土焚香而月氐國王忽睹異香成穗傳燈録逆風香竺法深孫興公共聽北來道人與支道林瓦棺寺講小品北來屢設疑問林辨答俱爽北道每屈孫問深公上人當是逆風家何以都不言深笑而不答曰白栴檀非不馥焉能逆風深夷然不屑波利質色香樹其香逆其風而聞今返之曰白栴檀非不香豈能逆風言深非不能難正不必難也古殿爐香問如何古殿一爐香寶蓋納師曰廣大勿入嗅者如何師曰六根俱不到買佛香問動容沈古路身沒乃方知此意如何師曰偷佛錢買佛香曰學人不會師曰不會即燒香供養本耶娘泐潭師話戒定香釋氏有定香戒香韓侍郎贈僧詩云一靈令用戒香薰結願香省郎逰花巖寺巖下見老僧前有香爐煙穟微甚僧謂曰此檀越結願香尚在而檀越已三生矣陳去非詩再燒結願香香偈謹爇道香德香無為香無為清淨自然香妙洞真香靈寶惡香朝三界香香滿瓊樓玉境遍諸天法界以此真香騰空上奏爇香有偈返生寶木沉水奇材瑞氣氤氲祥雲繚繞上通金闕下入幽冥道書香光楞嚴經大勢至法王子云如染香人身有香氣此則名曰香光香爐爐之名始見于周禮冢宰之屬宫人凡寢中共爐炭博山香爐武帝內傳有博山爐蓋西王母遺帝者事物紀原皇太子初拜有銅博山香爐東宫故事丁緩作九層博山香爐鏤琢奇禽怪獸皆自然能動西京雜記其爐象海中博山下盤貯湯使潤氣蒸香以象海之四環吕大臨考古圗被中香爐長安巧工丁緩作被中香爐亦名卧褥香爐本出房風其法後絶緩始更為之機環運轉四周而爐體常平可置于被褥故以為名今之香毬是也雜記薰爐尚書郎入直臺中給女侍史二人皆選端正指使從直女侍史執香爐燒熏以從入臺中給使護衣漢官儀金爐魏武上御物三十種有純金香爐一枚雜物疏麒麟晉儀禮大朝會郎鎮官以金鍍九尺麒麟大爐唐薛逢詩云獸坐金牀吐碧煙是也帳角香爐石季倫冬月為暖帳四角安綴金銀鑿鏤香爐鄴中記鵲尾香爐宋玉賢山隂人也既稟女質厥志彌髙自童年及笲應適外兄許氏密具法服登車既至大門時及交禮更著黃巾裙手執鵲尾香爐不親婦禮賓主駭愕夫家力不能屈乃放還遂出家梁大同初隱弱溪之間法苑珠林云香爐有柄可爇者曰鵲尾香爐百寶爐唐安樂公主百寶香爐長二丈朝野僉載香爐為寶子錢鎮州詩雖未脫五季餘韻然回環讀之故自娓娓可觀題者多云寶子弗知何物以余考之乃迦葉之香爐上有金華華內有金臺即臺為寶子則知寶子乃香爐耳亦可為此詩但圜若重規然豈漢丁緩被中之製乎黃長睿貪得銅爐何尚之奏庾仲文貪賄得嫁女具銅爐四人舉乃勝南史母夢香爐陶𢎞景母夢天人手執香爐來至其所已而有娠南史失爐筮卦會稽盧氏失博山香爐吳泰筮之曰此物質雖為金其實衆山有樹非林有孔非泉閶闔晨興見發青煙此香爐也語其處即求得集異記香爐墮地侯景呼東西南北皆謂為廂景幕牀東無故墮景曰此東廂香爐那忽下地識者以為湘東軍下之徴云南史覆爐示兆齊建武中明帝召諸王南康侍讀江泌憂念府王子琳訪志公道人問其禍福志公覆香爐灰示之曰都盡無餘後子琳被害南史香爐峯廬山有香爐峯李太白詩云日照香爐生紫煙來鵬詩云雲起爐峰一炷煙熏籠晉東宫故事云太子納妃有衣熏籠當亦秦漢之制也事物記原傳天香傳丁謂之香之為用從古矣所以奉髙明所以達蠲潔三代禋享首惟馨之薦而沉水薰陸無聞焉百家傳記萃芳之美而蕭茒鬱鬯不尊焉禮云至敬不享味貴氣臭也是知其用至重採製初略其名實繁而品類叢脞矣觀乎上古帝皇之書釋道經典之説則記録綿逺贊煩嚴重色目至衆法度殊絶西方聖人曰大小世界上下內外種種諸香又曰千萬種和香若香若丸若末若坐以至華香果香樹香天和合之香又曰天上諸天之香又佛土國名衆香其香比於十方人天之香最為第一仙書云上聖焚百寶香天真皇人焚千和黃帝以沉榆蓂莢為香又曰真仙所焚之香皆聞百里有積煙成雲積雲成雨然則與人間所共貴者沉水薰陸也故經云沉水堅株又曰沉水香聖降之夕神導從有捧爐香者煙髙丈餘其色正紅得非天上諸天之香非三皇寶齋香珠法其法雜而末之色色至細然後叢聚杵之三萬緘以良器載蒸載和豆分而丸之珠貫而暴之且曰此香焚之上徹諸天蓋以沉水為宗薰陸副之也是知古聖欽崇之至厚所以備物寶妙之無極謂奕世寅奉香火之篤鮮有廢日然蕭茅之類隨其所備不足觀也祥符初奉詔充天書扶持使道場科醮無虛日永晝達夕寶香不絶乘輿肅謁則五上為禮真宗每至玉皇真聖祖位前皆五上香也馥烈之異非世所聞大約以沉水乳為末龍香和劑之此法纍稟之聖祖中禁少知者况外司耶八年掌國計兩鎮旄鉞四領樞軸俸給頒賚隨日而隆故苾芬之著特與昔異襲慶奉祀日賜供乳香一百二十斤入內副都知張淮能為使在宫觀密賜新香動以百數沈乳降真等香由是私門之沉乳足用有唐雜記言明皇時異人云醮席中每焚乳香靈祗皆去人至于今惑之真宗時親稟聖訓沉乳二香所以奉髙天上聖百靈不敢當也無他言上聖即政之六月授詔罷相分務西洛尋遣海南憂患之中一無塵慮越惟永晝晴天長霄垂象爐香之趣益增其勤素聞海南出香至多始命市之于閭里間十無一有假版官裴鶚者唐宰相晉公中令公之裔孫也土地所宜悉究本末且曰瓊管之地黎母山酋之四部境域皆枕山麓香多出此山甲於天下然取之有時售之有主蓋黎人皆力耕治業不以採香専利閩越海賈惟以餘杭船即市香每嵗冬季黎洞俟此船方入山尋採州人從而賈販盡歸船商故非時不有也香之類有四曰沉曰棧曰生結曰黃熟其為狀也十有二沉香得其八焉曰烏文格土人以木之格其沉香如烏文木之色而澤更取其堅格是美之至也曰黃蠟其表如蠟少刮削之黳紫相半烏文格之次也曰牛目與用及蹄曰雉頭洎髀若骨此沉香之狀土人别曰牛眼牛角牛蹄雞頭雞腿雞骨曰崑崙梅格棧香也此梅樹也黃黑相半而稍堅土人以此比棧香也曰蟲鏤凡曰蟲鏤其香尤佳蓋香兼黃熟蟲蛀及攻腐朽盡去菁英獨存者也曰傘竹格黃熟香也如竹色黃白而帶黑有似棧也曰茅葉如茅葉至輕有入水而沉者得沉香之餘氣也燃之至佳土人以其非堅實抑之黃熟也曰鷓鴣斑色駁雜如鷓鴣羽也生結香也棧香未成沉者有之黃熟未成棧者有之凡四名十二狀皆出一本樹體如白楊葉如冬青而小膚表也標末也質輕而散理疏以粗曰黃熟黃熟之中黑色堅徑者曰棧香棧香之名相傳甚逺即未知其旨惟沉香為狀也肉骨頴脫芒角鋭利無大小無厚薄掌握之有金玉之重切磋之有犀角之徑縱分斷瑣碎而氣脈滋益用之與臭塊者等鶚云香不欲絶大圍尺已上慮有水病若斤已上者合兩已下者中浮水即不沉矣又曰或有附于枯枿隱于曲枝蟄藏深根或抱貞木本或挺然結實混然成形嵌若巖石屹若歸雲如矯首龍如峩冠鳯如麟植趾如鴻鎩翮如曲肱如駢指但文理密緻光彩明瑩斤斧之迹一無所及置器以驗如石投水此香寶也千百一而已矣夫如是自非一氣粹和之凝結百神祥異之含育則何以羣木之中獨稟靈氣首出庶物得奉髙天也占城所産棧沉至多彼方貿遷或入番禺或入大食大食貴重棧沉香與黃金同價鄉耆云比嵗有大食番舶為颶風所逆寓此屬邑首領以富有自大肆筵設席極其誇詫州人私相顧曰以資較勝誠不敵矣然視其爐煙蓊鬱不舉乾而輕瘠而燋非妙也遂以海北岸者即席而焚之髙煙杳杳若引束絙濃腴湒湒如練凝漆芳馨之氣持久益佳大舶之徒由是披靡生結者取不俟其成非自然者也生結沉香品與棧香等生結棧香品與黃熟等生漆黃熟品之下也色澤浮虛而肌質散緩燃之辛烈少和氣久則瀆敗速用之即佳不同棧沉成香則永無朽腐矣雷化髙竇亦中國出香之地比海南者優劣不侔甚矣既所稟不同而售者多故取者速也是黃熟不待其成棧棧不待其成沉蓋取利者戕賊之深也非如瓊管皆深洞黎人非時不妄剪伐故樹無夭折之患得必皆異香曰熟香曰脫落香皆是自然成香餘杭市香之家有萬斤黃熟者得真棧百斤則為稀矣百斤真棧得上等沉香十數斤亦為難矣薰陸乳香之長大而明瑩者出大食國彼國香樹連山絡野如桃膠松脂委於石地聚而斂之若京坻香山多石而少雨載詢番舶則云昨過乳香山下彼人云此山不雨已三十年香中帶石末者非濫偽也地無土也然則此樹若生泥塗則香不得為香矣天地植物其有旨乎贊曰百昌之首備物之先於以相禋於以告虔孰歆至德孰享芳煙上聖之聖髙天之天序和香序麝本多忌過分必害沉實易和盈斤無傷零藿燥虛詹糖粘濕甘松蘇合安息鬱金捺多和羅之屬並被于外固無取于中土又棗膏昏蒙甲馢淺俗非惟無助于馨烈乃當彌增于尤疾也此序所言悉以比類朝士麝木多忌比庾憬之棗膏昏蒙比羊玄保甲馢淺俗比徐湛之甘松蘇合比惠休道人沉實易和蓋自比也笑蘭香序吳僧罄宜笑蘭香序曰豈非韓魏公所謂濃梅而黃太史所謂藏春者耶其法以沉為君雞舌為臣北苑之臣秬鬯十二葉之英銘華之粉柏麝之臍為佐以百花之液為使一炷如芡子許油然鬱然若嗅九畹之蘭而浥百畝之蕙也説香説程泰之秦漢以前二廣未通中國中國無今沉腦等香也宗廟焫蕭灌獻尚鬱食品貴椒至荀卿氏方言椒蘭漢雖已得南粵其尚臭之極者椒房郎官以雞舌奏事而已較之沉腦其等級之髙下不類也惟西京雜記載長安巧工丁緩作被下香爐頗疑已有今香然劉向銘博山爐亦止曰中有蘭綺朱火青煙玉臺新詠説博山爐亦曰朱火然其中青煙揚其間香風難久居空令蕙草殘二文所賦皆焚蘭蕙而非沉腦是漢雖通南粵亦未見粵香也漢武內傳載西王母降爇嬰香等品多名異然疑後人為之漢武奉仙窮極宫室帷帳器用之麗漢史備記不遺若曽創古來未有之香安得不記銘博山爐銘劉向嘉此正氣嶄巗若山上貫太華承以銅盤中有蘭綺朱火青煙香爐銘梁元帝蘇合氤氲飛煙若雲時濃更薄乍聚還分火微難盡風長易聞孰云道力慈悲所熏頌鬱金香頌左九嬪伊此奇香名曰鬱金越此殊域厥珍來尋芬香酷烈悅目欣心明德惟馨淑人是欽窈窕淑媛服之褵襟永垂名實曠世弗沉藿香頌江文通桂以過烈麝以太芬攉阻夭夀扶抑人文詎如藿香微馥微馚攝靈百仭養氣青雲瑞沉寶峰頌并序臣建謹案史記龜策傳曰有神龜在江南嘉林中嘉林者獸無虎狼鳥無鴟梟草無毒螫野火不及斧斤不至是謂嘉林龜在其中常巢于芳蓮之上在脅書文曰甲子重光得我者為帝王由是觀之豈不偉哉臣少時在書室中雅好焚香有海上道士向臣言曰子知沉之所出乎請為子言蓋江南有嘉林嘉林者美木也木美則堅實堅實則善沉或秋水泛溢美木漂流沉于海底蛟龍蟠伏于上故木之香清烈而戀水濤瀨淙激于下故木之形嵌空而類山近得小山于海賈巉巗可愛名之曰瑞沉寶峰不敢藏諸私室謹齋莊潔誠跪進玉陛以為天夀聖節瑞物之獻臣建謹拜手稽首而為之頌曰大江之南粵有嘉林嘉林之木入海而沉蛟龍枕之香冽自清濤瀨潄之峰岫乃成海神愕視不敢閟藏因潮而出瑞我明昌明昌至治如沉馨香明昌睿算如山久長臣老且耄聖恩曷報歌頌陳詩以配天保賦迷迭香賦魏文帝播西都之麗草兮應青春之凝暉流翠葉于纎柯兮結微根于丹墀芳莫秋之幽蘭兮麗崑崙之英芝信繁華之速逝兮弗見雕于嚴霜既經時而收采兮遂肅殺以增芳去枝葉而持御兮入綃縠之霧裳附玉體以行止兮順微風而舒光鬱金香賦傅玄葉萋萋以翠青英藴藴以金黃樹暗靄以成隂氣芬馥以含芳陵蘇合之殊珍豈艾蒳之足方榮耀帝宇香播紫宫吐芬揚烈萬里望風藝香賦傅咸擕昵友以逍遙兮覽偉草之敷英慕君子之𢎞覆兮超託軀于朱庭俯引澤于月壤兮仰吸潤乎太清繁兹緑葉茂此翠莖葉葉猗猗兮枝妍媚以回縈象春松之含曜兮鬱蓊蔚以蔥青幽蘭賦楊炯維幽蘭之芳草稟天地之純精抱青紫之奇色挺龍虎之佳名不起林而獨秀必固本而叢生爾乃丰茸十步綿連九畹莖受露而將低香從風而自逺當此之時叢蘭正滋美庭闈之孝子循南陔而采之楚襄王蘭臺之宫零落無叢漢武帝猗蘭之殿荒涼幾變聞昔日之芳菲恨今人之不見至若桃花水上佩蘭若而續魂竹箭山隂坐蘭亭而開宴江南則蘭澤為洲東海則蘭陵為縣隰有蘭兮蘭有枝贈逺别兮交新知氣如蘭兮長不改心若蘭兮終不移及夫東山月出西軒日晚授燕女于春閨降陳王于秋坂乃有送客金谷林塘坐曛鶴琴未罷龍劒將分蘭缸燭耀蘭麝氣氤舞袖回雪歌聲遏雲度清夜之未艾酌蘭英以奉君若夫靈均放逐離羣散侣亂鄢郢之南都下瀟湘之北渚步遲遲而適怨心鬱鬱而懷楚徒眷戀于君王斂精神于帝女河洲兮極目芳菲兮襲豫思公子兮不言結芳蘭兮延佇借如君章有德通神感靈懸車舊館請老山庭白露下而警鶴秋風髙而亂螢循階除而下望見秋蘭之青青重曰若有人兮山之阿紉秋蘭兮嵗月多思握之兮猶未得空佩之兮欲如何遂抽琴轉操為幽蘭之歌歌曰幽蘭生兮于彼朝陽含雨露之津潤吸日月之休光美人愁思兮採芙蓉于南浦公子忘憂兮樹萱草于北堂雖處幽林與窮谷不以無人而不芳趙元淑聞而歎曰昔聞蘭葉據龍圖復道蘭林引鳳雛鴻歸燕去紫莖歇露往霜來緑葉枯悲秋風之一敗與萬草而為芻木蘭賦并序李華華容石門山有木蘭樹鄉人不識伐以為薪餘一本方操柯未下縣令李韶行春見之息焉其隂喟然歎曰功刋桐君之書名載騷人之詞生於遐深委于薪燎天地之産珍物將焉用之爰戒虞衡禁其剪伐按本草木蘭似桂而香去風熱明耳目在木部上篇乃採斫以歸理疾多驗由是逺近從而採之幹剖支分殆枯稿矣士之生世出處語默難乎哉韶余從子也常為余言感而為賦云溯長江以遐覽愛楚山之寂寥山有嘉樹兮名木蘭鬱森森以苕苕當聖政之文明降元和於九霄更䘲冷之為虐貫霜雪而不凋白波潤其根柢玄雪暢其枝條沐春雨之濯濯鳴秋風以蕭蕭素膚紫肌緑葉緗蒂疏密聳附髙卑蔭蔽華如雪霜實若星麗節徑松竹香濃蘭桂宜不植于人間聊獨立于天際徒翳薈兮為鄰挺堅芳兮此身嘉名列于道書墜露飲乎騷人至若靈山霧歇藹藹林樾當楚澤之晨霞映洞庭之夜月發聰明于視聽洗煩濁于心骨韻衆壑之空洞淡微雲之滅沒草露白兮山淒淒鶴既唳兮猿復啼窅深林以冥冥覆百仭之玄溪彼逸人兮有所思戀芳隂兮步遲遲悵幽獨兮人莫知懷馨香兮將為誰惋樵父之無惠混衆木而皆盡指書類而揮斤遇仁人之不忍伊甘心而剿絶俄固柢於傾隕憐春華而朝搴兮顧落日而回軫達者有言巧勞智憂養命蠲疫人胡不求枝殘體剝澤盡枯留憔悴空山離披素秋鳥避弋而髙翔魚畏網而深遊不材則終其天年能鳴則危于俎羞奚此木之不終獨隱見而罹憂自昔淪芳于朝市墜實于林丘徒鬱咽而無聲可勝言而計籌者哉吾聞曰人助者信神聽者直則臧倉譛言宣尼失職出處語默與時消息則子雲投閣方回受殛故知天地無心死生同域紜紜品物物有其極至人者要惟循於自然寧任夫智之與力雖賢愚各全其好惡草木不夭其生植已而已而翳疑誤不可得沉香山子賦蘇子瞻古者以藝為香以蘭為芬以鬱鬯為祼以脂蕭為焚以椒為堅以蕙為薰杜蘅帶屈菖蒲薦文麝多忌而本羶蘇合若香而實葷嗟吾知之幾何為六入之所分方根塵之起滅常顛倒其天君每求似于髣佛或鼻勞而妄聞獨沉水為近正可以配薝蔔而並云矧儋崖之異産實超然而不羣既金堅而玉潤亦鶴骨而龍筋惟膏液之內足故把握而兼斤顧占城之枯朽宜爨釜而燎蚊宛彼小山巉然可欣如太華之倚天象小孤之插雲往夀子之生朝以寫我之老勤子方面壁以終日豈亦終歸田而自耘幸置此于几席養幽芳于帨帉無一往之發烈有無窮之氤氲豈非獨以飲東坡之夀亦所以食黎人之芹也雞舌香賦顔博文沈括以丁香為雞舌而醫者疑之古人用雞舌取其芬芳便于奏事世俗蔽于所習以丁香狀之于雞舌大不類也乃慨然有感為賦以解之嘉物之産竄山谷其根盤貯龍隱蛇伏期微生之可保處幽翳而自足方吐英而布葉似干世而無欲郁郁嬌黃綽綽疏緑偶咀嚼而有味以奇功而見録攘肌被逼粉骨遭辱雖功利之及人恨此身之莫贖惟彼雞舌味和而長氣烈而揚可與君子同升廟堂發胸臆之藻繪粲齒牙之氷霜一語不忌澤及四方溯日月而上征與鴛鷺而同翔惟其施之得宜豈凡物之可當以彼疑似猶有可議雖二名之靡同渺不害其為貴彼鳳􅖪而龍凖謂蜂目而烏喙况稱諸木之長稽形而實質類者哉殊不知天下之物竊名者多矣雞腸鳥啄牛舌馬齒川有羊蹄山有鳶尾龍膽虎掌豨膏鼠耳鴟腳羊眼鹿角豹足彘顱狼跋狗脊馬目燕頷之黍虎皮之稻蓴貴雉尾藥尚雞爪葡萄取象于身乳婆律謬稱于龍腦筍雞脛以為珍瓠牛角而貴早亦有鴨腳之葵狸頭之瓜魚甲之松鶴翎之花以雞頭龍眼而充果以雀舌鷹爪而名茶彼爭功而擅價咸好大而喜誇其間名實相叛是非迭居得其實者如聖賢之在髙位無其實者如名器之假盜軀嗟所遇之不同亦自賢而自愚彼方遺臭于海上豈芬芳之是娛嫫母飾貌而薦衾西子掩面而守閭餌醯醬而委醍醐佩碔砆而捐瓊琚捨文茵兮卧籧篨習薤露兮廢笙竽劒非錐而補履驥垂頭而駕車蹇不遇而被謗將栖栖而焉圖是香也市井所緩廊廟所急豈比馬蹄之近俗燕尾之就濕聽秋雨之淋淫若蒼天為兹而雪泣若將有人依龜甲之屏炷鵲尾之爐研以鳳咮筆以鼠鬚作蜂腰鶴膝之語為鵠頭虻腳之書為兹香而解嘲明氣類而不殊願獲用於賢相藹芳烈於天衢銅博山香爐賦梁昭明太子稟至精之純質産靈嶽之幽深探衆倕之妙旨運公輸之巧心有蕙帶而巗隱亦霓裳而升仙寫嵩山之巃嵸象鄧林之芊眠于時青煙司寒晨光翳景翠帷已低蘭膏未屏炎蒸內耀苾芬外揚似慶雲之呈色若景星之舒光信名嘉而用美永為玩于華堂詩詩句百和裛衣香金泥蘇合香紅羅復斗帳四角垂香囊古詩盧家蘭室桂為梁中有鬱金蘇合香梁武帝合歡襦重百和香陳後主綵墀散蘭麝風起自生香鮑照燈影照無寐心清聞妙香朝罷香煙擕滿袖杜工部燕寢凝清香韋蘇州裊裊沉水煙披書古藝馥守帳燃香暮沉香火暖茱茰煙李長吉豹尾香煙滅陸厥重熏異國香李廓多燒荀令香張見正然香氣散不飛煙陸瑜羅衣亦罷熏胡曽沉水熏衣白璧堂胡宿丙舍無人遺燼香溫庭筠夜燒沉水香香煙橫碧縷蘇子瞻珠緑凝篆香黃魯直焚香破今夕燕坐獨焚香簡齋焚香澄神慮蘇州向來一瓣香敬為曾南豐陳後山博山爐中百和香鬱金蘇合及都梁吳以均金爐絶沉燎熏爐雞棗香博山爐煙吐香霧龍爐傍日香爐煙添栁重韋巨源金爐蘭麝香沈荃期爐熏暗徘徊張籍金爐細炷通李賀睡鴨香爐換夕熏荀令香爐可待熏李商隱衣冠身惹御爐香賈至博山爐吐五雲香韋應物蓬萊宫繞玉爐香陳陶噴香睡獸髙三只羅隱繡屏銀鴨香蓊濛溫庭筠浥浥爐香初泛夜東坡日烘荀令炷香爐山谷午夢不知緣底事篆煙燒盡一盤花劉屛山微風不動金猊香陸放翁寶熏黃魯直賈天錫惠寶熏以兵衛森畫戟燕寢凝清香十詩報之險心遊萬仞躁欲生五兵隱几香一炷靈臺湛空明晝食鳥窺臺宴坐日過砌俗氛無因來煙霏作輿衛石蜜化螺甲榠樝煮水沉博山孤煙起對此作森森輪囷香事已郁郁著書畫誰能入吾室脫汝世俗械賈侯懷六韜家有十二戟天資喜文事如我有香癖林花飛片片香歸銜泥燕開閣和春風還尋蔚宗傳公虛采芹宫行樂在小寢香光當發聞色敗不可稔牀帷夜氣馥衣桁曉煙凝風溝鳴急雪睡鴨照華燈雉尾映鞭聲金爐拂太清班近聞香早歸來學得成衣篝麗紈綺有待乃芬芳當念真富貴自熏知見香帳中香二首山谷百鍊香螺沉水寶熏近出江南一穗黃雲繞几深禪相對同參螺甲割崑崙耳香材屑鷓鴣斑欲雨鳴鳩日永不惟睡鴨春間戲用前韻有聞帳中香以為熬蠟香海上有人逐臭天生鼻孔司南但印香巗本寂不必叢林遍參我讀蔚宗香傳文章不減二班誤以甲為淺俗却知麝要防間和魯直韻東坡四句燒香偈子隨香遍滿東南不是聞思所及且令鼻觀先參萬卷明窗小字眼花只有斕斑一炷煙消火冷半生身老心間次韻答子瞻山谷置酒未容虛左論詩時要指南迎笑天香滿袖喜君先赴朝參迎燕溫風旋旋潤花小雨斑斑一炷香中得意九衢塵裏偷間再和置酒未逢休沐便同越北燕南且復歌呼相和隔牆知是曺參丹青已是前世竹石時窺一斑五字還當靖節數行誰似髙間印香東坡子由生日以檀香觀音像及新合印香銀篆盤為夀栴檀婆律海外芬西山老臍柏所薰香螺脫黶來相羣能結縹眇風中雲一燈如螢起微焚何時度盡繆篆紋繚繞無窮合復分綿綿浮空散氤氲東坡持是夀卯君君少與我師皇墳旁資老聃釋迦文共厄中年點蠅蚊晚遇斯須何足云君方論道承華勛我亦旗鼓嚴中軍國恩未報敢不勤但願不為世所醺爾來白髮不可耘問君何時返鄉枌收拾散亡理放紛此心實與香俱焄聞思大士應已聞沉香石東坡壁立孤峯倚硯長共凝沉水得頑蒼欲隨楚客紉蘭佩誰信吳兒是木腸山下曽逢化私石玉中還有辟邪香早知百和俱灰燼未信人言弱勝剛凝齋香曽子固每覺西齋景最幽不知官是古諸侯一尊風月身無事千里耕桑嵗共秋雲水醒心鳴好鳥玉泉清耳潄沉流香煙細細臨黃卷凝在香煙最上頭肖梅香張吉甫江村招得玉妃魂化作金爐一炷雲但覺清芬暗浮動不知碧篆已氤氲春收東閣簾初下夢想西湖被更熏真似吾家雪溪上東風一夜隔籬聞香界朱晦菴幽興年來莫與同滋蘭聊欲泛東風真成佛國香雲界不好淮山桂樹叢花氣無邊醺欲醉靈芬一點靜還通何須楚客紉秋佩坐卧經行向此中次韻蘇藉返魂梅六首陳子髙誰道春歸無覔處眠齋香霧作春昏君詩似説江南信試與梅花招斷魂東風欺人底薄相花信無端沖雪來妙手誰知煨燼裏等間種得臘前梅花開莫奏傷心曲花落休矜稱面粧只憶夢為蝴蝶去香雲密處有春光老夫粥後惟耽睡灰暖香濃百念消不學東門醉公子鴨爐煙裏逞風標鼻根無奈重香繞編處春隨夜色勻眼底狂花開底事依然看作一枝春漫道君家四壁空衣篝沉水晚朦朧詩情似被花相惱入我香奩境界中龍涎香劉子暈瘴海驪龍供素沫蠻村花露浥情滋微參鼻觀猶疑似全在爐煙未發時燒香曲李商隱鈿雲蟠蟠牙比魚孔雀翅尾蛟龍鬚漳宫舊樣博山爐楚嬌捧笑開芙蕖八蠶繭綿小分炷獸焰微紅隔雲母白天月澤寒未冰金虎含秋向東吐玉珮呵光銅照昏簾波日暮衝斜門西來欲上茂陵樹柏梁已失栽桃魂露庭月井大紅氣輕衫薄袖當君意蜀殿瓊人伴夜深金鑾不問殘燈事何當巧吹君懷度襟灰為土填清露焚香邵康節安樂窩中一炷香陵晨焚意豈尋常禍如能免人須諂福若待求天可量且異緇黃徼廟貌又殊兒女裛衣裳非圖聞道至於此金玉誰家不滿堂焚香楊廷秀琢瓷作鼎碧于水削銀為葉輕如紙不文不武火力均閉閣下簾風不起詩人自炷古龍涎但令有香不見煙素馨欲開末利折底迅龍涎和檀棧平生飽食山村味不料此香殊嫵媚呼兒急取蒸木犀却作書生真富貴燒香陳去非明窗延靜畫默坐息諸緣聊將無窮意寓此一炷煙當時戒定慧妙供均人天我豈不清闕于今醒心然爐香裊孤碧雲縷飛數千悠然凌空去縹眇隨風還世事有過現薰性無變遷應如水中月波定還自丸焚香郝伯常花落深庭日正長蜂何撩繞燕何忙匡牀不下凝塵滿消盡年光一炷香覔香磬室從來一物無博山惟有一香爐而今荀令真成癖祇欠精神裊坐隅覔香顔博文王希深合和新香煙氣清灑不類尋常等可以為道人開筆端消息玉水沉沉影銅爐裊裊煙為思丹鳳髓不愛老龍涎皂帽真間客黃衣小病仙定知雲屋下繡被有人眠修香陸放翁空庭一炷上有神明家廟一炷曾英祖靈且祈持此而已此而不為吁嗟已矣香爐四座且莫喧願聽歌一言請説銅香爐崔巍象南山上枝似松柏下根據銅盤雕文各異類離婁自相連誰能為此器公輸與魯般朱火然其中青煙揚其間順入君懷裏四座莫不歡香風難久居空令蕙草殘博山香爐劉繪參差鬱佳麗合沓紛可憐蔽虧千種樹出沒萬重山上鏤秦王子駕鶴翔紫煙下刻盤龍勢矯首半銜連傍為洛水麗芝蓋出巖間後有漢逰女拾翠弄全妍榮色何雜揉縟繡更相鮮麏鹿或朦倚林薄香芊眠撩華如不發含薰未肯然風生玉階樹露浥曲池蓮寒蟲飛夜室秋雲沒曉天博山香爐沈約凝芳俟朱燎先鑄首山銅環姿信嵒崿奇態實玲瓏赤松逰其上斂足御輕鴻蛟龍蟠其下驤首盻層穹嶺側多奇樹或孤或連叢巗間有佚女垂袂似含風翬飛若未已虎視鬱金雄百和清夜吐蘭煙四面融如彼崇朝氣觸石繞華嵩樂府詞句玉帳鴛鴦噴沉麝李太白沉檀煙起盤紅霧徐昌圖寂寞繡屏香一縷韋衣惹御爐香薛昭藴博山香炷融戚熙震爐香煙冷自亭亭李中主香草續殘爐謝希深爐香靜逐遊絲轉晏同叔四和裊金鳬秦叔度盡日水沉香一縷玉盤香篆看徘徊趙德慶金鴨香凝袖衣潤費爐煙周美成朱麝堂中香長日篆煙銷香滿雲窗月户熏爐熟水留香繡被薰香透元裕之鷓鴣天木犀元裕之桂子紛翻浥露黃桂華髙韻靜年芳薔薇水潤宫衣軟波律膏清月殿涼雲袖句海仙方情緣心事兩相忘衰蓮枉誤秋風客可是無塵袖裏香天香龍涎香王沂孫孤嶠蟠煙層濤悅月驪宫夜採鉛水訊逺槎風夢深薇露化作斷魂心字紅瓷候火還玉指一縷縈簾翠影依稀海風雲氣幾回嬌半醉剪青燈夜寒花碎更好故溪飛雪小窗深閉荀令如今頓老總忘却尊前舊風味漫惜餘薰空篝素被慶清朝慢軟香詹天遊紅雨爭霏芳塵生潤將春都搗成泥分明蕙風薇露花氣遲遲無奈汗酥浥透溫柔鄉裏濕雲癡偏厮稱霓裳霞珮玉骨冰肌誰品處誰詠處驀然地不在洎意聞欵欵生綃扇底嫩涼動箇些兒似醉渾無氣力海棠一色睡胭脂真奇絶這般風韻韓夀爭知陳氏香譜卷四
